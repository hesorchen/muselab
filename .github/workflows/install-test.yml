# Cross-OS install-script regression. Runs the platform installers in
# non-interactive mode on clean runners and verifies the backend actually
# starts + answers /api/health. Catches issues that pytest can't — Node
# auto-install failures, fnm/brew path quirks, Docker image regressions, etc.
#
# `MUSELAB_SKIP_SERVICE=1` is set so we don't try to register systemd /
# launchd on the runner (no logind session on Linux GHA). The test then
# launches the backend manually and probes /api/health to confirm the
# install plumbing works.

name: install-test

on:
  push:
    branches: [main]
    paths:
      - 'scripts/install-*'
      - 'scripts/quick-install.sh'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/install-test.yml'
  pull_request:
    paths:
      - 'scripts/install-*'
      - 'scripts/quick-install.sh'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/install-test.yml'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Linux: 22.04 + 24.04 (both LTS releases users actually run). The runner
  # comes with Node pre-installed, so the auto-install path skips — but uv
  # and claude CLI are NOT pre-installed, exercising both fallbacks.
  # ---------------------------------------------------------------------------
  linux:
    name: linux (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    env:
      MUSELAB_NONINTERACTIVE: "1"
      MUSELAB_SKIP_SERVICE:   "1"
      MUSELAB_NO_BROWSER:     "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run install-linux.sh
        run: bash scripts/install-linux.sh

      - name: Launch backend in background
        run: |
          set -a; source .env; set +a
          nohup uv run python -m backend.main > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8765/api/health; then echo " — up after ${i}s"; exit 0; fi
            sleep 1
          done
          echo "::error::backend never answered /api/health"
          cat backend.log || true
          exit 1

      - name: Stop backend
        if: always()
        run: kill "$(cat backend.pid)" 2>/dev/null || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.os }}-logs
          path: |
            backend.log
            .env

  # ---------------------------------------------------------------------------
  # macOS: 13 (Intel) + 14 (Apple Silicon). Runner has brew pre-installed
  # AND Node, so the auto-install path takes the brew branch (or no-op).
  # ---------------------------------------------------------------------------
  macos:
    name: macos (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14]
    env:
      MUSELAB_NONINTERACTIVE: "1"
      MUSELAB_SKIP_SERVICE:   "1"
      MUSELAB_NO_BROWSER:     "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run install-macos.sh
        run: bash scripts/install-macos.sh

      - name: Launch backend in background
        run: |
          set -a; source .env; set +a
          nohup uv run python -m backend.main > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://127.0.0.1:8765/api/health; then echo " — up after ${i}s"; exit 0; fi
            sleep 1
          done
          echo "::error::backend never answered /api/health"
          cat backend.log || true
          exit 1

      - name: Stop backend
        if: always()
        run: kill "$(cat backend.pid)" 2>/dev/null || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}-logs
          path: |
            backend.log
            .env

  # ---------------------------------------------------------------------------
  # Docker: build the image AND actually run it. Existing ci.yml docker
  # job only builds — that misses runtime regressions (missing dep,
  # bad CMD args, healthcheck broken). This job complements it.
  # ---------------------------------------------------------------------------
  docker-run:
    name: docker (build + run + probe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (single-arch, cache-from gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true             # makes the image available to docker run
          tags: muselab:itest
          cache-from: type=gha

      - name: Prepare archive + token
        run: |
          mkdir -p test-archive
          echo "MUSELAB_TOKEN=$(openssl rand -hex 32)" > test.env

      - name: Run container
        run: |
          docker run -d --name muselab-itest \
            --env-file test.env \
            -e MUSELAB_ROOT=/data \
            -p 127.0.0.1:8765:8765 \
            -v $PWD/test-archive:/data \
            muselab:itest

      - name: Wait for /api/health (up to 60s — first-boot includes uvicorn cold start)
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:8765/api/health; then echo " — up after ${i}s"; exit 0; fi
            sleep 1
          done
          echo "::error::container never answered /api/health"
          docker logs muselab-itest || true
          exit 1

      - name: Verify HEALTHCHECK passing
        run: |
          # docker compose's healthcheck takes ~start_period (15s) before it's
          # accurate. By now we've already waited 60s so it should be healthy.
          status="$(docker inspect --format='{{.State.Health.Status}}' muselab-itest)"
          echo "container health: $status"
          if [[ "$status" != "healthy" ]]; then
            echo "::error::expected healthy, got $status"
            docker logs muselab-itest
            exit 1
          fi

      - name: Stop container
        if: always()
        run: docker rm -f muselab-itest 2>/dev/null || true

      - name: Show container logs on failure
        if: failure()
        run: docker logs muselab-itest 2>&1 || true
