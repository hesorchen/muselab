name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --frozen
      - name: Run tests
        env:
          # Use a minimal env so backend.settings doesn't refuse to import.
          MUSELAB_TOKEN: "ci-test-token-1234567890abcdef-min-32"
          MUSELAB_ROOT: ${{ github.workspace }}/.ci-archive
        run: |
          mkdir -p $MUSELAB_ROOT
          uv run pytest tests/ -v

  lint:
    name: ruff + muselab-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - name: Install deps
        # Sync dev group so the pinned ruff version from pyproject.toml is
        # used (matches `scripts/lint.sh` local dev). Replaces the previous
        # `uv tool install ruff` which pulled latest non-reproducibly.
        run: uv sync --frozen
      - name: ruff check
        # Blocking now that the backend is clean — regressions fail CI
        # instead of accumulating silently.
        run: uv run ruff check backend/ tests/
      - name: muselab lint (encoding / class collisions)
        # Catches the bug classes we've shipped historically — Python file
        # I/O without encoding, etc. See scripts/lint.sh for the rule list.
        run: bash scripts/lint.sh

  # Builds the Dockerfile on every PR (smoke), and on push to main / tags it
  # publishes a multi-arch image to GitHub Container Registry.
  #   ghcr.io/<owner>/muselab:latest       — main branch HEAD
  #   ghcr.io/<owner>/muselab:1.2.3        — git tag v1.2.3
  #   ghcr.io/<owner>/muselab:1.2          — major.minor of latest tag
  #   ghcr.io/<owner>/muselab:sha-<short>  — every commit on main
  docker:
    name: docker build + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # required for ghcr.io push
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        if: github.event_name != 'pull_request'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name lowercased — ghcr is case-sensitive on /<owner>
          images: ghcr.io/${{ github.repository_owner }}/muselab
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # PR: build only (single arch) for smoke test — no push, no QEMU cost.
      - name: Build (PR smoke test, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: muselab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # main / tags: multi-arch build + push.
      - name: Build + push (multi-arch)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
