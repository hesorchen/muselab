                        </template>
                        <!-- MCP tool: pretty-printed JSON if it parses, else text -->
                        <template x-if="toolResultKind(m) === 'mcp'">
                          <pre class="mcp-result" x-text="toolResultBodyText(m)"></pre>
                        </template>
                        <!-- Fallback: plain text body -->
                        <template x-if="!toolResultKind(m)">
                          <pre x-text="toolResultBodyText(m)"></pre>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- system_note -->
              <template x-if="m.role === 'system_note'">
                <div class="sys-note" x-text="m.text"></div>
              </template>

              <!-- ask_user_question -->
              <template x-if="m.role === 'ask_user_question'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': streaming && (i === 0 || (messages[i-1] && messages[i-1].role === 'user')) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="ask-question">
                    <div class="ask-header">
                      <span class="ask-title" x-text="t('ask.title')"></span>
                      <span x-show="m.submitted" class="ask-submitted-tag" x-text="t('ask.submitted')"></span>
                    </div>
                    <template x-for="(q, qIdx) in m.questions" :key="qIdx">
                      <div class="ask-question-block">
                        <div class="ask-question-head">
                          <span x-show="q.header" class="ask-question-chip" x-text="q.header"></span>
                          <span class="ask-question-text" x-text="q.question"></span>
                          <span x-show="q.multiSelect" class="ask-multi-tag" x-text="t('ask.multi')"></span>
                        </div>
                        <!-- Render normalized options. The label is computed
                             via askOptionLabel() instead of `opt.label` directly
                             so an old backend (pre-normalize) that forwarded
                             raw model output as `["a","b"]` / `[{text:"a"}]`
                             still produces clickable buttons. New backends
                             normalize this in ask_user_question.py — this is
                             belt+suspenders for "user is running new frontend
                             against old backend" scenarios. -->
                        <div class="ask-options">
                          <template x-for="(opt, optIdx) in (q.options || [])" :key="optIdx">
                            <button class="ask-option"
                                    :class="{ picked: isAskOptionPicked(m, qIdx, askOptionLabel(opt)), disabled: m.submitted, 'has-preview': !!(opt && opt.preview) }"
                                    :disabled="m.submitted"
                                    @click="q.multiSelect ? toggleAskOption(m, qIdx, askOptionLabel(opt)) : pickAskOption(m, qIdx, askOptionLabel(opt))">
                              <div class="ask-option-label" x-text="askOptionLabel(opt)"></div>
                              <div x-show="askOptionDesc(opt)" class="ask-option-desc" x-text="askOptionDesc(opt)"></div>
                              <!-- Optional preview (markdown / mockup / code).
                                   Model can attach rich context via the SDK's
                                   AskUserQuestion.options[].preview field; we
                                   render it as a collapsed footnote that opens
                                   in place when the option is focused / hovered. -->
                              <div x-show="opt && opt.preview"
                                   class="ask-option-preview"
                                   x-html="mdRender(opt && opt.preview || '')"></div>
                            </button>
                          </template>
                        </div>
                      </div>
                    </template>
                    <div x-show="(m.questions || []).some(q => q.multiSelect) && !m.submitted && !m.askOtherOpen" class="ask-submit-row">
                      <button class="btn-primary" @click="submitAskAnswers(m)" x-text="t('ask.submit')"></button>
                    </div>
                    <!-- Free-text fallback. The MCP tool only lets the model
                         offer 2-4 fixed options; sometimes none fit and the
                         user wants to say something else. Claude Code's
                         AskUserQuestion has an implicit "Other" for the same
                         reason — without it the question is a forced choice
                         and the user has to either pick a wrong-ish option
                         or wait 10 min for the 600 s timeout to bail. Click
                         "其他" → inline textarea → submit routes the text
                         through /api/chat/answer the same way the buttons do,
                         so the model sees it as a normal tool result. -->
                    <div class="ask-other-section" x-show="!m.submitted">
                      <button x-show="!m.askOtherOpen"
                              class="ask-other-toggle"
                              @click="openAskOther(m)"
                              x-text="lang==='zh' ? '其他（自由输入）' : 'Other (custom answer)'"></button>
                      <div x-show="m.askOtherOpen" class="ask-other-form">
                        <textarea x-model="m.askOtherText"
                                  class="ask-other-textarea"
                                  rows="3"
                                  :placeholder="lang==='zh' ? '直接写你的回复…' : 'Type your reply…'"
                                  @keydown.escape.stop="cancelAskOther(m)"
                                  @keydown.meta.enter.prevent="submitAskOther(m)"
                                  @keydown.ctrl.enter.prevent="submitAskOther(m)"></textarea>
                        <div class="ask-other-actions">
                          <button class="ask-other-cancel" @click="cancelAskOther(m)"
                                  x-text="lang==='zh' ? '取消' : 'Cancel'"></button>
                          <button class="btn-primary" @click="submitAskOther(m)"
                                  :disabled="!(m.askOtherText || '').trim()"
                                  x-text="lang==='zh' ? '提交' : 'Submit'"></button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>

              <!-- permission_request -->
              <template x-if="m.role === 'permission_request'">
                <div class="msg-row">
                  <span class="msg-avatar assistant-avatar"
                        :class="{ 'is-streaming-avatar': streaming && (i === 0 || (messages[i-1] && messages[i-1].role === 'user')) }"
                        :title="mascotLabel()">
                    <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                  </span>
                  <div class="perm-request" :class="{ resolved: m.resolved }">
                    <div class="perm-header">
                      <span class="perm-title" x-text="t('perm.title')"></span>
                      <span x-show="m.resolved" class="perm-decision-tag"
                            :class="'perm-decision-' + m.decision"
                            x-text="t('perm.decision_' + m.decision)"></span>
                    </div>
                    <div class="perm-body">
                      <div class="perm-tool">
                        <span class="perm-tool-icon"><svg><use href="#i-tool"/></svg></span>
                        <span class="perm-tool-name" x-text="m.tool"></span>
                      </div>
                      <pre class="perm-summary" x-text="m.summary"></pre>
                    </div>
                    <div class="perm-actions" x-show="!m.resolved">
                      <button class="btn-deny" @click="decidePermission(m, 'deny')" x-text="t('perm.deny')"></button>
                      <button class="btn-allow" @click="decidePermission(m, 'allow')" x-text="t('perm.allow')"></button>
                      <button class="btn-always" @click="decidePermission(m, 'always')" x-text="t('perm.always')"></button>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Per-turn footer. A "turn" here = a contiguous run of
                   muse-side messages between two user messages. The
                   tail message of that run carries the footer; every
                   other message has it display:none. The footer hosts
                   BOTH the streaming dots (while in flight) and the
                   HH:MM completion stamp (once done) — so a multi-
                   block turn (thinking + tool_use + assistant + …)
                   shows ONE indicator at the bottom of the whole run,
                   not one per block.

                   Uses x-show (not <template x-if>) intentionally:
                   nesting x-if inside x-for had reactivity glitches
                   where isTurnTail() wasn't re-evaluated on push to
                   the messages array, leaving previous turn-tails
                   stuck "showing" or new ones never appearing. x-show
                   keeps the DOM node always present and only toggles
                   display, which Alpine handles reliably per-frame. -->
              <!-- Inline expression instead of method call so Alpine
                   tracks reactive deps (m.role / messages[i+1].role /
                   messages.length) directly — method calls aren't
                   guaranteed to wire up reactivity inside x-for. -->
              <div class="turn-footer"
                   x-show="m.role !== 'user' && (i === messages.length - 1 || (messages[i + 1] && messages[i + 1].role === 'user'))"
                   aria-hidden="true">
                <span x-show="streaming && i === messages.length - 1"
                      class="thinking-dots">
                  <span></span><span></span><span></span>
                </span>
                <span x-show="m.ts && !(streaming && i === messages.length - 1)"
                      class="msg-ts" :title="m.model || ''"
                      x-text="fmtTurnTime(m.ts)"></span>
              </div>
            </div>
          </template>
          <!-- Pending "Muse 正在思考" bubble — only while we're waiting for
               the very first chunk. Once a streaming assistant message has
               started accumulating text (its bubble is already rendered
               above via the x-for), this pending placeholder must hide or
               we get two stacked bubbles with overlapping model labels. -->
          <!-- Pending bubble: shown only when streaming AND there's no
               assistant-side msg yet (i.e. last msg is the user's
               input, or the message list is empty). Simpler than the
               old "role NOT in [assistant, tool_use, tool_result,
               thinking]" exclusion list — that list missed ask_user_
               question / permission_request / system_note, leaving
               the pending bubble's avatar duplicated next to those
               msgs' own avatars. Now: any non-user last msg already
               has its own avatar — suppress pending. -->
          <div x-show="streaming && (!messages.length
                                       || messages[messages.length-1].role === 'user')"
               class="msg assistant">
            <div class="msg-row">
              <span class="msg-avatar assistant-avatar is-streaming-avatar" :title="mascotLabel()">
                <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
              </span>
              <div class="bubble pending">
                <span class="thinking-dots"><span></span><span></span><span></span></span>
                <span class="thinking-label">
                  <span x-text="t('chat.thinking') + ' · ' + modelLabel(streamingModel)"></span>
                  <span x-show="streamElapsed > 1" class="stream-elapsed"
                        x-text="' · ' + streamElapsed.toFixed(1) + 's'"></span>
                </span>
              </div>
            </div>
          </div>

          <!-- Standalone .streaming-tail removed — its job is now done
               by .turn-footer inside the x-for loop, which renders on
               the tail block of each turn and shows dots while
               streaming + HH:MM once done. -->

          <!-- Pending queue: messages the user sent while Muse was still
               replying (or while a compact was running). They auto-drain on
               the next done event / compact-finally / activateTab. Faded
               + dashed border distinguishes them from real user bubbles. -->
          <template x-for="(q, qi) in (tabState[currentId] && tabState[currentId].pendingQueue || [])"
                    :key="q.id">
            <div class="msg user queued">
              <div class="msg-row queued-row">
                <div class="bubble user-bubble queued-bubble">
                  <div class="queued-header">
                    <span class="queued-icon">🕓</span>
                    <span class="queued-label"
                          x-text="(lang==='zh' ? '已排队 ' : 'Queued ') + (qi+1) + ' / '
                                   + (tabState[currentId].pendingQueue.length)"></span>
                    <span style="flex:1"></span>
                    <button class="queued-act icon-btn sm"
                            @click="editPendingQueueItem(currentId, qi)"
                            :title="lang==='zh' ? '编辑' : 'Edit'">
                      <svg><use href="#i-edit"/></svg>
                    </button>
                    <button class="queued-act icon-btn sm"
                            @click="removePendingQueueItem(currentId, qi)"
                            :title="lang==='zh' ? '移除' : 'Remove'">
                      <svg><use href="#i-x"/></svg>
                    </button>
                  </div>
                  <div class="queued-text" x-show="q.text" x-text="q.text"></div>
                  <div class="queued-attach"
                       x-show="(q.pendingImages && q.pendingImages.length)
                                || (q.pendingDocs && q.pendingDocs.length)">
                    <template x-for="(img, ii) in (q.pendingImages || [])" :key="'qi-'+ii">
                      <img class="queued-img" :src="img.preview" alt="" />
                    </template>
                    <template x-for="(doc, di) in (q.pendingDocs || [])" :key="'qd-'+di">
                      <span class="queued-doc-chip">
                        <svg><use href="#i-file-text"/></svg>
                        <span x-text="doc.name"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- Queue paused: an error during a queued chain stops auto-drain
               so the user can fix the root cause (quota / auth / cross-
               vendor) before continuing. Resume / Discard are explicit. -->
          <div x-show="tabState[currentId] && tabState[currentId]._queuePaused
                        && tabState[currentId].pendingQueue
                        && tabState[currentId].pendingQueue.length"
               class="queue-paused-banner">
            <span class="queue-paused-icon">⚠️</span>
            <span class="queue-paused-text"
                  x-text="(lang==='zh' ? '上一条出错，队列已暂停（' : 'Queue paused after error (')
                          + ((tabState[currentId] && tabState[currentId].pendingQueue
                              && tabState[currentId].pendingQueue.length) || 0)
                          + (lang==='zh' ? ' 条等待）' : ' waiting)')"></span>
            <button class="queue-paused-btn primary"
                    @click="resumeQueueDrain(currentId)"
                    x-text="lang==='zh' ? '续发' : 'Resume'"></button>
            <button class="queue-paused-btn"
                    @click="discardQueue(currentId)"
                    x-text="lang==='zh' ? '清空队列' : 'Discard'"></button>
          </div>

          <!-- Compact-in-progress placeholder bubble. Mirrors the streaming
               pending bubble above so the user sees a familiar "something is
               working" cue at the bottom of the chat (not just the silent
               shimmer in the top ctx-meter). Appears for the full window
               between native-compact POST and loadSession completing — can
               be ~20-60s on a long session. -->
          <div x-show="_compacting" class="msg assistant compact-pending">
            <div class="msg-row">
              <span class="msg-avatar assistant-avatar is-streaming-avatar" :title="mascotLabel()">
                <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
              </span>
              <div class="bubble pending">
                <span class="compact-pending-icon">📦</span>
                <span class="thinking-dots"><span></span><span></span><span></span></span>
                <span class="thinking-label" x-text="lang==='zh' ? '压缩对话中…' : 'Compacting conversation…'"></span>
              </div>
            </div>
          </div>
        </div>
        <button class="jump-bottom" x-show="!atBottom" @click="scrollToBottom(true)" :title="lang==='zh'?'最新':'Jump to latest'"><svg><use href="#i-arrow-down"/></svg></button>
        <!-- Outline FAB — sits right above jump-bottom in the same chat
             pane. Same visibility rule as jump-bottom (x-show="!atBottom")
             so the two appear/disappear together as a pair. -->
        <button class="chat-outline-fab" x-show="!atBottom"
                @click="msgOutlineOpen = true"
                :title="lang==='zh' ? '会话目录' : 'Outline'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <circle cx="4" cy="6" r="1" fill="currentColor"/>
            <circle cx="4" cy="12" r="1" fill="currentColor"/>
            <circle cx="4" cy="18" r="1" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <div class="chat-input">
        <!-- / slash command palette -->
        <div class="mention-pop slash-pop" x-show="slashShow" x-transition.opacity>
          <div class="mention-hint" x-text="t('slash.hint')"></div>
          <template x-for="(c, i) in slashResults" :key="c.name">
            <div :class="'mention-item ' + (slashIdx===i?'sel':'')"
                 @mousedown.prevent="pickSlash(i)" @mouseenter="slashIdx=i">
              <span class="slash-name mono" x-text="'/' + c.name"></span>
              <span class="slash-desc" x-text="c.desc[lang] || c.desc.zh"></span>
            </div>
          </template>
          <div class="hint-row" x-show="!slashResults.length" x-text="t('slash.none')"></div>
        </div>
        <!-- @ mention -->
        <div class="mention-pop" x-show="mentionShow" x-transition.opacity>
          <div class="mention-hint" x-html="lang==='zh' ? '<span class=&quot;kbd&quot;>↑↓</span> 选 · <span class=&quot;kbd&quot;>Enter</span> 插入 · <span class=&quot;kbd&quot;>Esc</span> 关' : '<span class=&quot;kbd&quot;>↑↓</span> nav · <span class=&quot;kbd&quot;>Enter</span> insert · <span class=&quot;kbd&quot;>Esc</span> close'"></div>
          <template x-for="(f, i) in mentionResults" :key="f.path">
            <div :class="'mention-item ' + (mentionIdx===i?'sel':'')"
                 :title="f.path"
                 @mousedown.prevent="pickMention(i)" @mouseenter="mentionIdx=i">
              <span class="icon"><svg><use :href="iconRef(f)"/></svg></span>
              <div class="body">
                <div class="name ellipsis" x-text="f.name"></div>
                <div class="path-hint ellipsis" x-text="f.path"></div>
              </div>
            </div>
          </template>
          <div class="hint-row" x-show="!mentionResults.length" x-text="t('files.empty_search')"></div>
        </div>
        <!-- Attachment preview row (above input). -->
        <!-- Pending attachment chips. Upload starts eagerly the moment the
             file is picked / pasted / dropped — by the time the user finishes
             typing it's almost always done. We deliberately DON'T render an
             "uploading…" spinner: the spinner used to make the chip feel like
             a separate uploading step before send, when in fact send-time
             auto-wait (sendMessage) already handles the rare case where the
             upload is still in flight. Only the .error state gets a visual —
             a red border via .img-chip.error / .doc-chip.error in styles.css. -->
        <div class="img-attachments" x-show="pendingImages.length || pendingDocs.length">
          <template x-for="(img, i) in pendingImages" :key="img.id || ('i'+i)">
            <div class="img-chip" :class="{ uploading: img.uploading, error: img.error }">
              <img :src="img.preview" alt="" />
              <button class="img-chip-x icon-btn sm"
                      @click="removePendingImage(i)" :title="t('img.remove')">
                <svg><use href="#i-x"/></svg>
              </button>
              <!-- Slim animated progress bar at the chip's bottom edge.
                   Replaces the previous big spinning overlay (user wanted
                   the chip to feel "uploaded" instantly); a hairline gives
                   the necessary feedback on slow / large uploads without
                   reading as a separate processing step. Disappears the
                   moment upload completes or errors out. -->
              <div x-show="img.uploading" class="chip-upload-bar"></div>
            </div>
          </template>
          <template x-for="(doc, i) in pendingDocs" :key="doc.id || ('d'+i)">
            <div class="doc-chip" :class="{ uploading: doc.uploading, error: doc.error }"
                 :title="doc.name + ' · ' + doc.kind">
              <span class="doc-chip-icon"><svg><use href="#i-file-text"/></svg></span>
              <div class="doc-chip-body">
                <div class="doc-chip-name" x-text="doc.name"></div>
                <div class="doc-chip-kind" x-text="doc.kind"></div>
              </div>
              <button class="doc-chip-x icon-btn sm"
                      @click="removePendingDoc(i)" :title="t('img.remove')">
                <svg><use href="#i-x"/></svg>
              </button>
              <div x-show="doc.uploading" class="chip-upload-bar"></div>
            </div>
          </template>
        </div>
        <!-- VSCode-Claude–style layout:
             row 1: textarea (full width, no neighbors)
             row 2: bottom toolbar with all controls — attach / model /
                    permission / thinking / ctx chip / send -->
        <div class="chat-input-wrap"
             @dragover.prevent="dragHover=true"
             @dragleave="dragHover=false"
             @drop.prevent="dragHover=false; onAttachDrop($event)"
             :class="{ 'drag-hover': dragHover }">
          <!-- No `accept` filter — lets the user pick any file from the OS
               picker. The classifier (frontend + backend) decides what
               actually gets inlined; unsupported types are rejected with
               a clear toast instead of being hidden in the picker. -->
          <input type="file" x-ref="attachInput"
                 multiple style="display:none" @change="onAttachPicked($event)" />
          <!-- 包一个 noop form：iOS 17+ AutoFill 会用"页面上下文"决定要不要在
               键盘上方塞快译条；只要 textarea 没有 form 父元素 / form 里有
               type=password input，iOS 就会把它当成账户字段。display:contents
               让这个 form 不参与布局，只提供 DOM 语义。 -->
          <form autocomplete="off" onsubmit="return false" style="display:contents">
          <textarea x-model="input" x-ref="chatInput"
                    class="chat-input-textarea"
                    name="muselab-chat-message"
                    inputmode="text"
                    autocomplete="off" autocorrect="off"
                    autocapitalize="sentences" spellcheck="false"
                    enterkeyhint="send"
                    data-1p-ignore="" data-lpignore="true" data-form-type="other"
                    @keydown.enter.prevent.stop="onEnter($event)"
                    @keydown.escape="mentionShow=false; slashShow=false"
                    @keydown.up="onChatArrowUp($event)"
                    @keydown.down="(mentionShow || slashShow) && _navPop(1) && $event.preventDefault()"
                    @input="onChatInput($event); autoGrow($event.target)"
                    @paste="onImagePaste($event)"
                    @focus="onChatInputFocus($event)"
                    @blur="document.body.classList.remove('kb-open')"
                    @click="onChatInputClick($event)"
                    :placeholder="t('chat.placeholder')"></textarea>
          </form>
          <div class="chat-toolbar">
            <!-- Attach button -->
            <button @click="$refs.attachInput.click()"
                    class="chat-toolbar-btn"
                    :disabled="streaming" :title="t('attach.title')">
              <svg><use href="#i-paperclip"/></svg>
            </button>
            <!-- Skills drawer toggle — always reachable from chat (not just
                 the empty-chat ready card). Opens a card grid of every
                 discoverable skill across project / user / plugin scopes.
                 Uses the line-SVG puzzle (i-puzzle) so it matches the
                 paperclip / send / stop sibling buttons; emoji 🧩 was
                 visually jarring next to monochrome SVGs. -->
            <button @click="toggleSkillsDrawer()"
                    class="chat-toolbar-btn"
                    :title="t('set.skills.drawer_open')"
                    aria-label="Open skills list">
              <svg><use href="#i-puzzle"/></svg>
            </button>
            <!-- Model selector -->
            <select x-model="model" @change="onModelChange()"
                    class="chat-toolbar-select"
                    :title="lang==='zh' ? '切换模型' : 'Switch model'">
              <template x-if="model && !availableModels.some(m => m.model === model)">
                <option :value="model" x-text="model"></option>
              </template>
              <template x-for="grp in modelGroups()" :key="grp.name">
                <optgroup :label="grp.name">
                  <template x-for="m in grp.items" :key="m.model">
                    <option :value="m.model" x-text="m.label"></option>
                  </template>
                </optgroup>
              </template>
            </select>
            <!-- Permission mode -->
            <select x-model="permission" class="chat-toolbar-select chat-toolbar-permission"
                    :title="t('set.label.default_permission')">
              <option value="bypassPermissions">bypass</option>
              <option value="acceptEdits">acceptEdits</option>
              <option value="default">default</option>
              <option value="plan">plan</option>
            </select>
            <!-- Reasoning effort. Empty = SDK adaptive default (Opus 4.7's
                 adaptive thinking picks per turn). Overrides apply session-
                 wide and trigger a client rebuild on next turn. -->
            <select x-model="effort" @change="onEffortChange()"
                    class="chat-toolbar-select chat-toolbar-effort"
                    :title="t('effort.title')">
              <option value="" x-text="t('effort.auto')"></option>
              <option value="low" x-text="t('effort.low')"></option>
              <option value="medium" x-text="t('effort.medium')"></option>
              <option value="high" x-text="t('effort.high')"></option>
              <option value="xhigh" x-text="t('effort.xhigh')"></option>
              <option value="max" x-text="t('effort.max')"></option>
            </select>
            <!-- Context ring — % used. Click to compact. Right-click
                 opens the SDK breakdown popup (the dedicated magnifier
                 button was removed per user request). -->
            <button class="chat-toolbar-ring"
                    :class="{
                      warn: sessionUsage.context_used_pct >= 70 && sessionUsage.context_used_pct < 90,
                      danger: sessionUsage.context_used_pct >= 90,
                    }"
                    @click="runCompact()"
                    @contextmenu.prevent="showCtxBreakdown()"
                    :title="ctxRingTitle()">
              <svg viewBox="0 0 20 20" width="18" height="18">
                <circle cx="10" cy="10" r="7" fill="none"
                        stroke="var(--c-bg-4)" stroke-width="2.5"/>
                <circle cx="10" cy="10" r="7" fill="none"
                        stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-dasharray="43.98"
                        :stroke-dashoffset="43.98 * (1 - Math.min(100, sessionUsage.context_used_pct||0) / 100)"
                        transform="rotate(-90 10 10)"/>
              </svg>
            </button>
            <span class="chat-toolbar-spacer"></span>
            <!-- Send / Stop. While `_sendWaitingForUpload` is true (rare:
                 user hit send while a slow attachment upload is still in
                 flight) the button stays in "send" form but is disabled —
                 the auto-wait inside sendMessage resolves within 30 s and
                 the click effectively becomes synchronous from the user's
                 POV. Without this disabling, double-tap could queue two
                 sends for the same upload. -->
            <button x-show="!streaming" @click="send()"
                    :disabled="_sendWaitingForUpload || (!input.trim() && !pendingImages.length && !pendingDocs.length)"
                    class="btn-primary chat-toolbar-send" :title="t('btn.send')">
              <span class="icon"><svg><use href="#i-send"/></svg></span><span x-text="t('btn.send')"></span>
            </button>
            <!-- Queue-send: visible while streaming/compact. send() detects
                 the busy state and routes to _enqueueMessage. Disabled when
                 input + attachments are empty, otherwise click parks the
                 message on tabState[currentId].pendingQueue. Sized as a
                 26×26 square to match the stop button right next to it
                 (icon-only siblings read as a pair); a small badge in the
                 corner surfaces the current backlog count. -->
            <button x-show="streaming"
                    @click="send()"
                    :disabled="!input.trim() && !pendingImages.length && !pendingDocs.length"
                    class="chat-toolbar-queue"
                    :title="t('queue.button_hint')">
              <svg><use href="#i-plus"/></svg>
              <span class="chat-toolbar-queue-badge"
                    x-show="_currentQueueLen() > 0"
                    x-text="_currentQueueLen()"></span>
            </button>
            <button x-show="streaming" @click="stop()" class="btn-danger chat-toolbar-send" :title="t('btn.stop') + ' (Esc)'">
              <span class="icon"><svg><use href="#i-square"/></svg></span><span x-text="t('btn.stop')"></span>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile tab bar — only shown via CSS @media on narrow viewports.
         Sits as a sibling of the panes in the same grid; on mobile, the panes
         become full-width and we swap which one is visible via mobileTab. -->
    <nav class="mobile-tab-bar" x-show="authed">
      <button :class="{active: mobileTab==='files'}" @click="mobileTab='files'">
        <span class="icon"><svg><use href="#i-folder"/></svg></span>
        <span x-text="t('pane.files')"></span>
      </button>
      <button :class="{active: mobileTab==='preview'}" @click="mobileTab='preview'">
        <span class="icon"><svg><use href="#i-file-text"/></svg></span>
        <span x-text="t('pane.preview')"></span>
      </button>
      <button :class="{active: mobileTab==='chat'}" @click="mobileTab='chat'">
        <span class="icon"><svg><use href="#i-brain"/></svg></span>
        <span x-text="t('pane.chat')"></span>
      </button>
    </nav>

  </div>

  <!-- ============ Message outline modal ============
       Lists every user prompt in the current session; tap a row to scroll
       chat to that message + flash highlight. Entry point: chat-tabs-actions
       outline button (☰). On mobile this slides up as a bottom sheet, on
       desktop it centers as a normal modal. -->
  <div class="msg-outline-modal" x-show="msgOutlineOpen"
       x-transition.opacity
       @click.self="msgOutlineOpen = false"
       @keydown.escape.window="msgOutlineOpen = false">
    <div class="msg-outline-panel" @click.stop>
      <div class="msg-outline-head">
        <span class="msg-outline-label"
              x-text="(lang==='zh' ? '会话目录 ' : 'Outline ') + '(' + outlineMessages().length + ')'"></span>
        <button class="msg-outline-close" @click="msgOutlineOpen = false"
                :title="lang==='zh' ? '关闭 (Esc)' : 'Close (Esc)'">×</button>
      </div>
      <ul class="msg-outline-list">
        <template x-for="(m, i) in outlineMessages()" :key="m.uuid || m._k || ('o-' + i)">
          <li @click="_scrollToUserMsg(m); msgOutlineOpen = false"
              :title="m.text || m.body || ''">
            <span class="msg-outline-idx" x-text="'#' + (i + 1)"></span>
            <span class="msg-outline-text ellipsis" x-text="outlineText(m)"></span>
            <span class="msg-outline-time" x-text="m.ts ? fmtHM(m.ts) : ''"></span>
          </li>
        </template>
      </ul>
      <div x-show="outlineMessages().length === 0" class="msg-outline-empty"
           x-text="lang==='zh' ? '此会话还没有 user 消息' : 'No user messages yet'"></div>
    </div>
  </div>

  <!-- ============ Image lightbox ============ -->
  <!-- Click anywhere — backdrop, image itself, or the explicit × button — to
       close. Previously the image swallowed clicks (@click.stop) so users
       had to find the backdrop or hit the corner ×; the image-toggles-itself
       pattern is what every modern photo viewer does (iOS Photos, Telegram). -->
  <div class="lightbox"
       x-show="lightbox.show"
       x-transition.opacity
       @click="lightbox.show = false"
       @keydown.escape.window="lightbox.show = false">
    <img :src="lightbox.src" class="lightbox-img"
         @click.stop="lightbox.show = false" alt="" />
    <button class="lightbox-close"
            :title="lang==='zh' ? '关闭 (Esc)' : 'Close (Esc)'"
            @click.stop="lightbox.show = false">×</button>
  </div>

  <!-- ============ Toast ============ -->
  <div class="toast-stack">
    <template x-for="t in toasts" :key="t.id">
      <div :class="'toast ' + (t.type || '')">
        <span class="icon">
          <svg x-show="t.type==='success'"><use href="#i-check-circle"/></svg>
          <svg x-show="t.type==='error'"><use href="#i-alert-circle"/></svg>
          <svg x-show="t.type==='warn'"><use href="#i-alert-triangle"/></svg>
          <svg x-show="!t.type || t.type==='info'"><use href="#i-info"/></svg>
        </span>
        <div class="body" x-text="t.msg"></div>
        <button x-show="t.action" class="toast-action"
                @click="runToastAction(t)" x-text="t.action && t.action.label"></button>
        <button class="close"
                :title="lang==='zh' ? '关闭' : 'Dismiss'"
                @click="dismissToast(t.id)"><svg style="width:14px;height:14px"><use href="#i-x"/></svg></button>
      </div>
    </template>
  </div>

  <!-- ============ Context Menu ============ -->
  <div class="ctx-menu" x-show="ctxMenu.show"
       :style="`top:${ctxMenu.y}px; left:${ctxMenu.x}px`"
       @click.away="ctxMenu.show=false">
    <!-- 目录专属：新建 -->
    <button class="ctx-item" @click="ctxAction('newFile')" x-show="(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-file"/></svg></span><span x-text="t('btn.new_file')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('newDir')" x-show="(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-folder-plus"/></svg></span><span x-text="t('btn.new_dir')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('upload')" x-show="(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-upload"/></svg></span><span x-text="t('btn.upload')"></span>
    </button>
    <div class="ctx-sep" x-show="(ctxMenu.node && ctxMenu.node.is_dir)"></div>
    <!-- 文件专属 -->
    <button class="ctx-item" @click="ctxAction('open')" x-show="!(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-eye"/></svg></span><span x-text="t('btn.preview')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('mention')" x-show="!(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-at"/></svg></span><span x-text="t('btn.at_mention')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('download')" x-show="!(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-download"/></svg></span><span x-text="t('btn.download')"></span>
    </button>
    <!-- 通用 -->
    <button class="ctx-item" @click="ctxAction('copyPath')">
      <span class="icon"><svg><use href="#i-copy"/></svg></span><span x-text="t('btn.copy_path')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('rename')">
      <span class="icon"><svg><use href="#i-edit"/></svg></span><span x-text="t('btn.rename')"></span>
    </button>
    <div class="ctx-sep"></div>
    <button class="ctx-item danger" @click="ctxAction('delete')">
      <span class="icon"><svg><use href="#i-trash"/></svg></span><span x-text="t('btn.delete')"></span>
    </button>
  </div>
  <!-- 隐藏 input：右键"上传文件到这里"复用 -->
  <input type="file" x-ref="ctxUpload" style="display:none" @change="ctxUploadHandler($event)" />

  <!-- ============ Settings Modal ============ -->
  <div class="modal-backdrop" x-show="settings.show" @click.self="settings.show=false">
    <div class="modal settings-modal" @keydown.escape.window="settings.show=false">
      <div class="modal-head">
        <span class="modal-title">⚙ <span x-text="t('set.title')"></span></span>
        <button class="modal-close" @click="settings.show=false"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <div class="modal-body settings-modal-body">
        <!-- Mobile-only iOS-style menu. On desktop (isWideScreen=true)
             everything below renders as one long scroll, like before.
             On phone (isWideScreen=false): if activePage is null, show
             this menu; if set, show only the corresponding section +
             a back button. Per-section x-show conditions below switch
             on this same activePage. -->
        <ul class="settings-menu"
            x-show="!isWideScreen && !settings.activePage">
          <li class="settings-menu-item" @click="settings.activePage='lang'">
            <span class="settings-menu-icon">🌐</span>
            <span class="settings-menu-title" x-text="t('set.sec.lang')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='provider'">
            <span class="settings-menu-icon">🔑</span>
            <span class="settings-menu-title" x-text="t('set.sec.provider')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='appearance'">
            <span class="settings-menu-icon">🎨</span>
            <span class="settings-menu-title" x-text="t('set.sec.appearance')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='notification'">
            <span class="settings-menu-icon">🔔</span>
            <span class="settings-menu-title"
                  x-text="lang==='zh' ? '通知' : 'Notifications'"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='defaults'">
            <span class="settings-menu-icon">⚙️</span>
            <span class="settings-menu-title" x-text="t('set.sec.defaults')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='model_params'">
            <span class="settings-menu-icon">🧠</span>
            <span class="settings-menu-title" x-text="t('set.sec.model_params')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='skills'">
            <span class="settings-menu-icon">🧩</span>
            <span class="settings-menu-title" x-text="t('set.sec.skills')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='mcp'">
            <span class="settings-menu-icon">🔌</span>
            <span class="settings-menu-title" x-text="t('set.sec.mcp')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item" @click="settings.activePage='versions'">
            <span class="settings-menu-icon">🛠</span>
            <span class="settings-menu-title"
                  x-text="lang==='zh' ? '版本与升级' : 'Versions & upgrade'"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
          <li class="settings-menu-item"
              @click="settings.activePage='cost'; loadCostDashboard();">
            <span class="settings-menu-icon">💰</span>
            <span class="settings-menu-title" x-text="t('set.sec.cost')"></span>
            <span class="settings-menu-chevron">›</span>
          </li>
        </ul>

        <!-- Mobile-only back button — shown on detail pages. -->
        <button class="settings-back"
                x-show="!isWideScreen && settings.activePage"
                @click="settings.activePage = null">
          <span>‹</span>
          <span x-text="lang==='zh' ? '返回' : 'Back'"></span>
        </button>

        <div class="settings-section" data-page="lang"
             x-show="isWideScreen || settings.activePage === 'lang'">
          <div class="settings-section-title" x-text="t('set.sec.lang')"></div>
          <div class="settings-row">
            <label x-text="t('set.label.lang')"></label>
            <div class="lang-picker">
              <button class="btn-ghost" :class="{active: lang==='zh'}" @click="setLang('zh')" x-text="t('set.lang.zh')"></button>
              <button class="btn-ghost" :class="{active: lang==='en'}" @click="setLang('en')" x-text="t('set.lang.en')"></button>
            </div>
          </div>
        </div>

        <div class="settings-section" data-page="provider"
             x-show="isWideScreen || settings.activePage === 'provider'">
          <div class="settings-section-title" x-text="t('set.sec.provider')"></div>
          <div class="settings-hint" x-text="lang==='zh' ? '填入新值并保存即可生效；留空表示不修改。' : 'Enter new value and save to apply; leave blank to keep existing.'"></div>
          <template x-for="p in settings.providers" :key="p.env_key">
            <div class="settings-row provider-row">
              <label x-text="p.display + ' (' + p.env_key + ')'"></label>
              <div class="settings-input-wrap">
                <input type="password" class="settings-input"
                       :placeholder="p.configured ? p.masked : t('set.key_unset')"
                       x-model="settings.draftKeys[p.env_key]" />
                <span x-show="p.configured" class="settings-badge ok" x-text="t('set.key_set')"></span>
                <button x-show="p.configured" class="btn-ghost sm"
                        @click="probeProvider(p.env_key)" :title="t('set.probe_tip')"
                        x-text="t('set.probe')"></button>
              </div>
              <!-- Per-provider help text + console link -->
              <div x-show="PROVIDER_HELP[p.env_key]" class="provider-help">
                <span x-text="PROVIDER_HELP[p.env_key]?.[lang]"></span>
                <a x-show="PROVIDER_HELP[p.env_key]?.url"
                   :href="PROVIDER_HELP[p.env_key]?.url"
                   target="_blank" rel="noopener"
                   x-text="lang==='zh' ? '打开控制台 ↗' : 'Open console ↗'"></a>
              </div>
              <!-- Inline result of last test, persisted until next test -->
              <div x-show="settings.probeResults[p.env_key]"
                   class="probe-result"
                   :class="{ ok: settings.probeResults[p.env_key]?.ok,
                              err: !settings.probeResults[p.env_key]?.ok }">
                <span x-show="settings.probeResults[p.env_key]?.ok">✅</span>
                <span x-show="!settings.probeResults[p.env_key]?.ok">❌</span>
                <span x-text="settings.probeResults[p.env_key]?.text"></span>
              </div>
            </div>
          </template>
        </div>

        <div class="settings-section" data-page="appearance"
             x-show="isWideScreen || settings.activePage === 'appearance'">
          <div class="settings-section-title" x-text="t('set.sec.appearance')"></div>
          <div class="settings-row">
            <label x-text="t('set.label.accent')"></label>
            <div class="accent-picker">
              <template x-for="c in ACCENT_PRESETS" :key="c.value">
                <button class="accent-swatch"
                        :class="{active: accent===c.value}"
                        :style="`background:${c.value}`"
                        :title="c.name[lang] || c.name.zh"
                        @click="setAccent(c.value)"></button>
              </template>
              <input type="color" :value="accent" @input="setAccent($event.target.value)"
                     class="accent-custom" :title="lang==='zh' ? '自定义' : 'Custom'" />
            </div>
          </div>
        </div>

        <!-- Versions + upgrade — shows current vs latest SDK / CLI, one-click bump. -->
        <div class="settings-section" data-page="versions"
             x-show="isWideScreen || settings.activePage === 'versions'">
          <div class="settings-section-title">
            <span x-text="lang==='zh' ? '版本与升级' : 'Versions & upgrade'"></span>
            <button class="btn-ghost sm" @click="loadVersions()"
                    :disabled="settings.versionsLoading"
                    style="margin-left: 8px;"
                    x-text="settings.versionsLoading ? (lang==='zh' ? '检查中…' : 'Checking…') : (lang==='zh' ? '检查更新' : 'Check')"></button>
          </div>
          <template x-if="settings.versions">
            <div>
              <table class="version-table">
                <thead>
                  <tr>
                    <th x-text="lang==='zh' ? '组件' : 'Component'"></th>
                    <th x-text="lang==='zh' ? '已安装' : 'Installed'"></th>
                    <th x-text="lang==='zh' ? '最新' : 'Latest'"></th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>claude-agent-sdk</td>
                    <td><code x-text="settings.versions.current?.sdk || '—'"></code></td>
                    <td><code x-text="settings.versions.latest?.sdk || '?'"></code></td>
                    <td>
                      <span x-show="settings.versions.sdk_upgrade_available" class="upgrade-badge"
                            x-text="lang==='zh' ? '有更新' : 'update'"></span>
                      <span x-show="!settings.versions.sdk_upgrade_available && settings.versions.current?.sdk" class="upgrade-badge ok"
                            x-text="lang==='zh' ? '最新' : 'latest'"></span>
                      <button x-show="settings.versions.sdk_upgrade_available"
                              class="btn-ghost xs"
                              :disabled="settings.upgradeRunning"
                              @click="runUpgrade('sdk')"
                              x-text="lang==='zh' ? '升级' : 'Upgrade'"></button>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <span x-text="lang==='zh' ? 'bundled CLI（随 SDK 自动更新）' : 'bundled CLI (auto with SDK)'"></span>
                    </td>
                    <td><code x-text="settings.versions.current?.bundled_cli || '—'"></code></td>
                    <td>—</td>
                    <td>
                      <span class="upgrade-badge ok" x-text="lang==='zh' ? '内置' : 'bundled'"></span>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <span x-text="lang==='zh' ? 'system CLI（仅 Pro 登录用）' : 'system CLI (Pro login only)'"></span>
                    </td>
                    <td><code x-text="settings.versions.current?.system_cli || (lang==='zh' ? '未安装（可选）' : 'not installed (optional)')"></code></td>
                    <td><code x-text="settings.versions.latest?.cli || '?'"></code></td>
                    <td>
                      <span x-show="settings.versions.system_cli_upgrade_available" class="upgrade-badge"
                            x-text="lang==='zh' ? '有更新' : 'update'"></span>
                      <span x-show="!settings.versions.system_cli_upgrade_available && settings.versions.current?.system_cli" class="upgrade-badge ok"
                            x-text="lang==='zh' ? '最新' : 'latest'"></span>
                      <span x-show="!settings.versions.current?.system_cli" class="upgrade-badge ok"
                            x-text="lang==='zh' ? '可不装' : 'optional'"></span>
                      <button x-show="settings.versions.system_cli_upgrade_available"
                              class="btn-ghost xs"
                              :disabled="settings.upgradeRunning"
                              @click="runUpgrade('cli')"
                              x-text="lang==='zh' ? '升级' : 'Upgrade'"></button>
                    </td>
                  </tr>
                  <tr>
                    <td>python</td>
                    <td><code x-text="settings.versions.current?.python || '—'"></code></td>
                    <td>—</td>
                    <td></td>
                  </tr>
                </tbody>
              </table>
              <div x-show="settings.versions.expected_cli_version && settings.versions.current?.cli &&
                            settings.versions.expected_cli_version !== settings.versions.current?.cli"
                   class="settings-hint warn">
                <span x-text="(lang==='zh' ? '⚠ SDK 期望 CLI 版本 ' : '⚠ SDK expects CLI ') + (settings.versions.expected_cli_version || '?')"></span>
              </div>
              <div class="settings-row" style="margin-top: 10px;">
                <button class="btn-primary sm" @click="runUpgrade()"
                        :disabled="settings.upgradeRunning ||
                                    (!settings.versions.sdk_upgrade_available && !settings.versions.system_cli_upgrade_available)"
                        x-text="settings.upgradeRunning ? (lang==='zh' ? '升级中… (可能需要 30s)' : 'Upgrading… (30s)') : (lang==='zh' ? '一键全部升级' : 'Upgrade all')"></button>
              </div>
              <template x-if="settings.upgradeResult">
                <div class="upgrade-result" :class="{ ok: settings.upgradeResult.ok, err: !settings.upgradeResult.ok }">
                  <div x-show="settings.upgradeResult.ok"
                       x-text="lang==='zh' ? '✅ 升级完成' : '✅ Upgrade complete'"></div>
                  <div x-show="!settings.upgradeResult.ok"
                       x-text="lang==='zh' ? '❌ 升级失败 — 查看下方步骤' : '❌ Upgrade failed — see steps below'"></div>
                  <div x-show="settings.upgradeResult.needs_restart" class="restart-hint">
                    <div x-text="lang==='zh' ? '需要重启服务以加载新版 SDK：' : 'Restart service to load new SDK:'"></div>
                    <pre x-text="settings.upgradeResult.restart_hint"></pre>
                  </div>
                  <details>
                    <summary x-text="lang==='zh' ? '查看升级日志' : 'View upgrade log'"></summary>
                    <template x-for="(s, i) in settings.upgradeResult.steps" :key="i">
                      <div class="upgrade-step">
                        <div class="upgrade-step-name" x-text="s.step + (s.rc != null ? ' (rc=' + s.rc + ')' : '')"></div>
                        <pre x-show="s.output" x-text="s.output"></pre>
                      </div>
                    </template>
                  </details>
                </div>
              </template>
            </div>
          </template>
          <template x-if="!settings.versions && !settings.versionsLoading">
            <div class="settings-hint"
                 x-text="lang==='zh' ? '点击「检查更新」查询 PyPI + npm 上的最新版本。' : 'Click Check to query PyPI + npm for the latest versions.'"></div>
          </template>
        </div>

        <!-- Cost dashboard — aggregated per-turn $ usage across all
             sessions. Loads lazily when the user navigates to this
             section (loadCostDashboard called on menu click + on first
             desktop open via openSettings). -->
        <div class="settings-section" data-page="cost"
             x-show="isWideScreen || settings.activePage === 'cost'">
          <div class="settings-section-title">
            <span x-text="t('set.sec.cost')"></span>
            <button class="btn-ghost sm" @click="loadCostDashboard(true)"
                    :disabled="cost.loading"
                    style="margin-left: 8px;"
                    x-text="cost.loading ? t('set.cost.loading') : t('set.cost.refresh')"></button>
            <select class="cost-window-select"
                    x-model.number="cost.windowDays"
                    @change="loadCostDashboard(true)">
              <option :value="7">7</option>
              <option :value="14">14</option>
              <option :value="30">30</option>
              <option :value="60">60</option>
              <option :value="90">90</option>
            </select>
          </div>
          <template x-if="!cost.data && !cost.loading">
            <div class="settings-hint" x-text="t('set.cost.empty')"></div>
          </template>
          <template x-if="cost.data">
            <div>
              <!-- 4 KPI cards: total tokens up top, cost as secondary line.
                   `last_30d` is actually the user-selected window — backend
                   field name is historical. Label it dynamically with the
                   real window days so "30" doesn't show when user picked 7/60/90. -->
              <div class="cost-kpis">
                <template x-for="key in ['today','last_7d','last_30d','all_time']" :key="key">
                  <div class="cost-kpi">
                    <div class="cost-kpi-label"
                         x-text="key === 'today'    ? t('set.cost.today')
                               : key === 'last_7d'  ? t('set.cost.7d')
                               : key === 'all_time' ? t('set.cost.all')
                               : (lang==='zh' ? `最近 ${cost.windowDays} 天` : `Last ${cost.windowDays}d`)"></div>
                    <div class="cost-kpi-value"
                         x-text="fmtTokens(totalTokens(cost.data[key]))"></div>
                    <div class="cost-kpi-sub"
                         x-text="cost.data[key].turns + ' ' + t('set.cost.turns') +
                                  (cost.data[key].cost > 0
                                    ? ' · $' + cost.data[key].cost.toFixed(2)
                                    : '')"></div>
                  </div>
                </template>
              </div>
              <!-- Token-class legend explains the 4 numbers below the chart.
                   Uses the window bucket (last_30d field name is historical). -->
              <div class="cost-token-breakdown"
                   x-show="cost.data.all_time.turns > 0">
                <span class="cost-token-chip in"
                      x-text="t('set.cost.in_tokens') + ': ' + fmtTokens(cost.data.last_30d.input_tokens)"></span>
                <span class="cost-token-chip out"
                      x-text="t('set.cost.out_tokens') + ': ' + fmtTokens(cost.data.last_30d.output_tokens)"></span>
                <span class="cost-token-chip cache"
                      x-text="t('set.cost.cache_tokens') + ': ' + fmtTokens(cost.data.last_30d.cache_read_tokens)"></span>
              </div>

              <!-- Per-day bar chart: stacked input + cache (visual hint of cache hit rate) -->
              <div class="cost-block-title" x-text="t('set.cost.by_day')"></div>
              <div class="cost-bars">
                <template x-for="d in cost.data.by_day" :key="d.date">
                  <div class="cost-bar"
                       :title="`${d.date}: in=${fmtTokens(d.input_tokens)} out=${fmtTokens(d.output_tokens)} cache_read=${fmtTokens(d.cache_read_tokens)} · ${d.turns} turns · $${d.cost.toFixed(4)}`">
                    <div class="cost-bar-fill"
                         :style="`height: ${costBarHeight(totalTokens(d))}%`"></div>
                    <div class="cost-bar-label" x-text="d.date.slice(5)"></div>
                  </div>
                </template>
              </div>

              <!-- Per-vendor rollup. Lets the user see "GLM total" vs
                   "Claude total" at a glance instead of mentally summing
                   sibling rows in the model breakdown below. Same widget
                   shape so it reads as one continuous section. -->
              <template x-if="cost.data.by_vendor && cost.data.by_vendor.length > 1">
                <div>
                  <div class="cost-block-title"
                       x-text="lang==='zh' ? '按厂商汇总' : 'By vendor'"></div>
                  <div class="cost-models">
                    <template x-for="v in cost.data.by_vendor" :key="v.vendor">
                      <div class="cost-model-row">
                        <div class="cost-model-name" x-text="v.vendor"></div>
                        <div class="cost-model-bar-track">
                          <div class="cost-model-bar-fill"
                               :style="`width: ${costVendorPct(totalTokens(v))}%`"></div>
                        </div>
                        <div class="cost-model-amount"
                             x-text="fmtTokens(totalTokens(v)) + ' · ' + v.turns + 'x' + (v.cost_reported ? (v.cost > 0 ? ' · $' + v.cost.toFixed(2) : '') : (lang==='zh' ? ' · $ —' : ' · $ —'))"
                             :title="!v.cost_reported ? (lang==='zh' ? '该厂商不报告 USD 费用，前端只跟踪 token 数；请去对应 console 看实际账单' : 'Vendor does not report USD cost — track tokens here, see vendor console for real billing') : ''"></div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Per-model breakdown — tokens primary, cost secondary -->
              <div class="cost-block-title" x-text="t('set.cost.by_model')"></div>
              <div class="cost-models">
                <template x-for="m in cost.data.by_model" :key="m.model">
                  <div class="cost-model-row">
                    <!-- Show the friendly label + vendor chip; raw model id
                         is on title= so power users can hover to see e.g.
                         "claude-sonnet-4-6" while the row reads "Sonnet 4.6". -->
                    <div class="cost-model-name" :title="m.model">
                      <span x-show="m.vendor && m.vendor !== 'Claude' && m.vendor !== 'Unknown'"
                            class="cost-model-vendor-chip" x-text="m.vendor"></span>
                      <span x-text="m.label || m.model"></span>
                    </div>
                    <div class="cost-model-bar-track">
                      <div class="cost-model-bar-fill"
                           :style="`width: ${costModelPct(totalTokens(m))}%`"></div>
                    </div>
                    <!-- For Claude rows show real cost; for vendors without
                         USD reporting show "$ —" with a tooltip explaining
                         that token counts are accurate but USD comes from
                         the vendor's own console. Hiding the $ entirely
                         (old behavior) made GLM look free, which it isn't. -->
                    <div class="cost-model-amount"
                         x-text="fmtTokens(totalTokens(m)) + ' · ' + m.turns + 'x' + (m.cost_reported ? (m.cost > 0 ? ' · $' + m.cost.toFixed(2) : '') : ' · $ —')"
                         :title="!m.cost_reported ? (lang==='zh' ? '该厂商不报告 USD 费用，前端只跟踪 token 数；请去对应 console 看实际账单' : 'Vendor does not report USD cost — track tokens here, see vendor console for real billing') : ''"></div>
                  </div>
                </template>
              </div>
              <div class="settings-hint" style="margin-top: 12px;"
                   x-text="t('set.cost.cost_note')"></div>
            </div>
          </template>
        </div>

        <div class="settings-section" data-page="defaults"
             x-show="isWideScreen || settings.activePage === 'defaults'">
          <div class="settings-section-title" x-text="t('set.sec.defaults')"></div>
          <div class="settings-row">
            <label x-text="t('set.label.default_model')"></label>
            <select x-model="settings.draftDefaults.model" class="settings-input">
              <template x-for="m in availableModels" :key="m.model">
                <option :value="m.model" x-text="m.group + ' · ' + m.label"></option>
              </template>
            </select>
          </div>
          <div class="settings-row">
            <label x-text="t('set.label.default_permission')"></label>
            <select x-model="settings.draftDefaults.permission" class="settings-input">
              <option value="bypassPermissions" x-text="lang==='zh' ? 'bypass（无提示）' : 'bypass (no prompts)'"></option>
              <option value="acceptEdits">acceptEdits</option>
              <option value="default">default</option>
              <option value="plan">plan</option>
            </select>
          </div>
          <div class="settings-hint warn"
               x-show="settings.draftDefaults.permission === 'bypassPermissions'"
               x-text="lang==='zh'
                 ? '⚠ bypass 模式下 Muse 可以读 / 改 / 删 archive 内任意文件，不会弹窗确认。仅在你充分信任当前对话内容时使用。'
                 : '⚠ In bypass mode Muse can read / edit / delete any file under your archive without confirmation. Only use it when you fully trust what you ask.'"></div>
        </div>

        <div class="settings-section" data-page="model_params"
             x-show="isWideScreen || settings.activePage === 'model_params'">
          <div class="settings-section-title" x-text="t('set.sec.model_params')"></div>
          <div class="settings-row">
            <label x-text="t('set.label.thinking_budget')"></label>
            <input type="number" min="1024" max="32000" step="1024"
                   x-model.number="settings.draftParams.thinking_budget" class="settings-input" />
          </div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '最大 tool 轮数 (0=不限)' : 'Max tool turns (0=unlimited)'"></label>
            <input type="number" min="0" max="50"
                   x-model.number="settings.draftParams.max_turns" class="settings-input" />
          </div>
        </div>

        <!-- Notification prefs — per-device (lives in localStorage),
             does NOT round-trip through /api/settings. Vibrate works
             whenever muselab is open in this tab; push covers the
             "muselab closed, still notify" case via a service worker. -->
        <div class="settings-section" data-page="notification"
             x-show="isWideScreen || settings.activePage === 'notification'">
          <div class="settings-section-title"
               x-text="lang==='zh' ? '通知' : 'Notifications'"></div>

          <!-- Per-device (localStorage) — controls how THIS browser/device
               reacts when push arrives. -->
          <div class="settings-subtitle"
               x-text="lang==='zh' ? '本设备' : 'This device'"></div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '完成时震动（前台）' : 'Vibrate on completion (foreground)'"></label>
            <label class="switch">
              <input type="checkbox" x-model="notifyPrefs.vibrate"
                     @change="saveNotifyPrefs()" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '推送通知（即使关掉 muselab）' : 'Push notifications (even when muselab is closed)'"></label>
            <label class="switch">
              <input type="checkbox" x-model="notifyPrefs.push"
                     @change="onPushToggle($event)" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="settings-hint" x-show="notifyPrefs.push"
               x-text="lang==='zh'
                 ? '已开启：浏览器会弹通知 + 震动。需要把 muselab 添加到主屏 (PWA) 才能在 iOS 上后台收推送。'
                 : 'Enabled — browser shows a notification + vibrates. iOS requires adding muselab to home screen (PWA) for background push.'"></div>

          <!-- Server-side gates — control which event classes muselab even
               sends to your devices. Saved with the rest of /api/settings. -->
          <div class="settings-subtitle"
               style="margin-top: 16px;"
               x-text="lang==='zh' ? '服务端推送开关' : 'Server-side push gates'"></div>
          <div class="settings-hint"
               x-text="lang==='zh'
                 ? '关掉对应分类后，muselab 后端就不会再为该类事件发推送（独立控制）。'
                 : 'Disabling a class stops the backend from sending pushes of that class entirely.'"></div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '⏰ 定时任务完成' : '⏰ Scheduled task done'"></label>
            <label class="switch">
              <input type="checkbox" x-model="settings.draftParams.notify_scheduled" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="settings-row">
            <label x-text="lang==='zh' ? '💬 普通会话回复完成' : '💬 Normal chat turn done'"></label>
            <label class="switch">
              <input type="checkbox" x-model="settings.draftParams.notify_normal" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="settings-hint"
               x-text="lang==='zh'
                 ? '这两个开关需要点底部「保存」才生效。'
                 : 'These two need clicking Save at the bottom to take effect.'"></div>
        </div>

        <div class="settings-section" data-page="skills"
             x-show="isWideScreen || settings.activePage === 'skills'">
          <div class="settings-section-title" x-text="t('set.sec.skills')"></div>
          <!-- Auto-detection notice: tells the user muselab automatically
               pulled in skills from their Claude Code setup. No setup
               needed — the SDK already loaded them. -->
          <div class="skills-meta" x-show="settings.skills.length">
            <span class="skills-count" x-text="t('set.skills.count', { n: settings.skills.length })"></span>
            <span class="skills-meta-sep">·</span>
            <span class="skills-source-hint" x-text="t('set.skills.source_hint')"></span>
          </div>
          <input type="text" class="skills-filter" x-model="settings.skillFilter"
                 :placeholder="lang==='zh' ? '过滤 skill（名字 / 描述）...' : 'Filter skills (name or description)…'"
                 x-show="settings.skills.length">
          <div x-show="!settings.skills.length" class="settings-empty"
               x-text="t('set.skills.empty')"></div>
          <!-- Card grid — no per-skill emoji (skills are dynamic, can't
               hardcode icons). Single generic 🧩 marker, scope tag tells
               where it came from. "Try this" pre-fills the chat input
               with a starter prompt; for the 7 hand-crafted ones we use
               a concrete demo prompt, others get a generic seed. -->
          <div class="skills-grid">
            <template x-for="sk in filteredSkills()" :key="sk.scope + ':' + sk.name + ':' + (sk.source || '')">
              <div class="skill-card">
                <div class="skill-card-head">
                  <span class="skill-card-icon">🧩</span>
                  <span class="skill-card-name mono" x-text="sk.name"></span>
                  <span class="skill-card-scope" :class="'skill-scope-' + sk.scope"
                        :title="sk.source || ''"
                        x-text="sk.source ? sk.scope + '·' + sk.source.split('/').slice(-1)[0] : sk.scope"></span>
                </div>
                <div class="skill-card-desc" x-text="sk.description || (lang==='zh' ? '（无描述）' : '(no description)')"></div>
                <div class="skill-card-actions">
                  <button class="skill-card-try" @click="trySkill(sk)"
                          x-text="t('set.skills.try')"></button>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div class="settings-section" data-page="mcp"
             x-show="isWideScreen || settings.activePage === 'mcp'">
          <div class="settings-section-title" x-text="t('set.sec.mcp')"></div>
          <div class="settings-hint" x-text="t('set.mcp.hint')"></div>

          <div x-show="!settings.mcpServers.length && !settings.mcpExamples.length"
               class="settings-empty" x-text="t('set.mcp.empty')"></div>

          <template x-for="s in settings.mcpServers" :key="s.name">
            <div class="mcp-server-row">
              <div class="mcp-server-main">
                <div class="mcp-server-name">
                  <span class="mcp-server-dot" :class="{ active: !s.disabled }"></span>
                  <span class="mono" x-text="s.name"></span>
                  <span class="mcp-server-tag" x-show="s.disabled" x-text="t('set.mcp.disabled')"></span>
                </div>
                <div class="mcp-server-cmd mono"
                     x-text="s.command + (s.args.length ? ' ' + s.args.join(' ') : '')"></div>
              </div>
              <div class="mcp-server-actions">
                <label class="switch sm" :title="t('set.mcp.toggle_title')">
                  <input type="checkbox" :checked="!s.disabled"
                         @change="toggleMcp(s.name, !$event.target.checked)" />
                  <span class="switch-slider"></span>
                </label>
                <button class="icon-btn sm" :title="t('set.mcp.delete')"
                        @click="deleteMcp(s.name)">
                  <svg><use href="#i-trash"/></svg>
                </button>
              </div>
            </div>
          </template>

          <div class="mcp-preset-row" x-show="settings.mcpExamples.length">
            <span class="settings-sub-label" x-text="t('set.mcp.presets')"></span>
            <template x-for="ex in settings.mcpExamples" :key="ex.name">
              <button class="mcp-preset-chip"
                      :disabled="settings.mcpServers.some(s => s.name === ex.name)"
                      @click="installMcpPreset(ex)">
                <span class="mono" x-text="ex.name"></span>
                <span x-show="ex.description" class="mcp-preset-desc" x-text="ex.description"></span>
              </button>
            </template>
          </div>

          <div class="settings-row mcp-add-row">
            <button class="btn-ghost sm" @click="settings.mcpDraft.show = !settings.mcpDraft.show"
                    x-text="settings.mcpDraft.show ? t('btn.cancel') : t('set.mcp.add')"></button>
          </div>
          <div x-show="settings.mcpDraft.show" class="mcp-add-form">
            <div class="settings-row">
              <label x-text="t('set.mcp.name')"></label>
              <input class="settings-input" x-model="settings.mcpDraft.name" placeholder="fetch" />
            </div>
            <div class="settings-row">
              <label x-text="t('set.mcp.command')"></label>
              <input class="settings-input" x-model="settings.mcpDraft.command" placeholder="uvx" />
            </div>
            <div class="settings-row">
              <label x-text="t('set.mcp.args')"></label>
              <input class="settings-input" x-model="settings.mcpDraft.argsStr"
                     placeholder="mcp-server-fetch" />
            </div>
            <div class="settings-row">
              <button class="btn-primary sm" @click="addMcpFromDraft()" x-text="t('set.mcp.add')"></button>
            </div>
          </div>
        </div>

      </div>
      <div class="modal-foot">
        <button @click="logout()" class="btn-ghost" style="margin-right:auto;color:var(--c-danger)" x-text="t('btn.logout')"></button>
        <button @click="settings.show=false" class="btn-ghost" x-text="t('btn.cancel')"></button>
        <button @click="saveSettings()" class="btn-primary" x-text="t('btn.save')"></button>
      </div>
    </div>
  </div>

  <!-- ============ Keyboard cheat-sheet ============ -->
  <!-- Triggered by `?` keypress outside any input. Lists all global
       shortcuts so users discover them without reading the README. -->
  <div class="modal-backdrop" x-show="cheatSheet.show"
       @click.self="cheatSheet.show=false">
    <div class="modal cheatsheet-modal"
         @keydown.escape.window="cheatSheet.show=false">
      <div class="modal-head">
        <span class="modal-title">⌨ <span x-text="lang==='zh' ? '键盘快捷键' : 'Keyboard shortcuts'"></span></span>
        <button class="modal-close" @click="cheatSheet.show=false"
                :title="lang==='zh' ? '关闭' : 'Close'"
                aria-label="Close">×</button>
      </div>
      <div class="modal-body">
        <table class="cheatsheet-table">
          <tbody>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">K</span></td>
              <td x-text="lang==='zh' ? '命令面板（搜索文件 / 会话 / 操作）' : 'Command palette (files, sessions, actions)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">T</span></td>
              <td x-text="lang==='zh' ? '新建会话' : 'New chat'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">W</span></td>
              <td x-text="lang==='zh' ? '关闭当前 tab' : 'Close current tab'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">Tab</span></td>
              <td x-text="lang==='zh' ? '下一个 tab（Shift 反向）' : 'Next tab (Shift = previous)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">1</span>–<span class="kbd">9</span></td>
              <td x-text="lang==='zh' ? '跳到第 N 个 tab' : 'Jump to Nth tab'"></td>
            </tr>
            <tr>
              <td><span class="kbd">⌘</span><span class="kbd">S</span></td>
              <td x-text="lang==='zh' ? '保存当前文件（编辑模式）' : 'Save file (in edit mode)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Enter</span></td>
              <td x-text="lang==='zh' ? '发送消息（桌面）；移动端是换行' : 'Send (desktop); newline on mobile'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Shift</span><span class="kbd">Enter</span></td>
              <td x-text="lang==='zh' ? '输入框换行' : 'Newline in input'"></td>
            </tr>
            <tr>
              <td><span class="kbd">@</span></td>
              <td x-text="lang==='zh' ? '在输入框引用 archive 文件（自动补全）' : 'Mention archive file in input (autocomplete)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">/</span></td>
              <td x-text="lang==='zh' ? '在输入框开头：slash 命令（/help /compact ...）' : 'At input start: slash commands (/help /compact …)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">↑</span></td>
              <td x-text="lang==='zh' ? '空输入框时：唤回上一条用户消息（重编辑 / 重发）' : 'In empty input: recall last user message (edit & resend)'"></td>
            </tr>
            <tr>
              <td><span class="kbd">Esc</span></td>
              <td x-text="lang==='zh' ? '关闭弹窗 / 取消编辑 / 停止流式' : 'Close modal / exit edit / stop stream'"></td>
            </tr>
            <tr>
              <td><span class="kbd">?</span></td>
              <td x-text="lang==='zh' ? '打开这个面板' : 'Open this cheat sheet'"></td>
            </tr>
          </tbody>
        </table>
        <div class="cheatsheet-hint"
             x-text="lang==='zh'
               ? 'Mac 用 ⌘，Windows / Linux 用 Ctrl'
               : 'Mac uses ⌘, Windows / Linux uses Ctrl'"></div>
      </div>
    </div>
  </div>

  <!-- ============ Skills drawer ============
       Card grid of every discoverable skill (project + user + plugin
       scopes). Opens from the 🧩 button in the chat toolbar. Clicking a
       card pre-fills the input with a seed prompt and focuses the
       textarea — works regardless of whether the user is on the empty
       chat or mid-conversation. -->
  <div class="skills-drawer-overlay" x-show="skillsDrawerOpen"
       @click.self="skillsDrawerOpen = false"
       @keydown.escape.window="skillsDrawerOpen = false"
       x-cloak>
    <div class="skills-drawer">
      <div class="skills-drawer-head">
        <div>
          <div class="skills-drawer-title" x-text="t('set.skills.drawer_title') + ' · ' + settings.skills.length"></div>
          <div class="skills-drawer-subtitle" x-text="t('set.skills.drawer_subtitle')"></div>
        </div>
        <button class="skills-drawer-close" @click="skillsDrawerOpen = false"
                :title="lang==='zh' ? '关闭' : 'Close'" aria-label="Close">×</button>
      </div>
      <input type="text" class="skills-filter" x-model="settings.skillFilter"
             :placeholder="lang==='zh' ? '过滤 skill...' : 'Filter skills…'">
      <div class="skills-drawer-body">
        <div x-show="!settings.skills.length" class="settings-empty"
             x-text="t('set.skills.empty')"></div>
        <div class="skills-grid">
          <template x-for="sk in filteredSkills()" :key="sk.scope + ':' + sk.name + ':' + (sk.source || '')">
