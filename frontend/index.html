<!-- Pre-Alpine fallback splash. Uses the same `.splash` styles as the Alpine
     version so the transition is invisible. Removed by x-init the moment
     Alpine takes over. -->
<div id="loading" class="splash">
  <span class="muse-mascot lg splash-mascot" style="width:72px;height:72px;display:inline-flex">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;color:#6093ff">
      <path d="M12 3 L20 7.5 L20 16.5 L12 21 L4 16.5 L4 7.5 Z"/>
    </svg>
  </span>
  <div class="splash-logo">muse<span class="accent">·lab</span></div>
  <div class="splash-text">正在唤醒 Muse</div>
</div>
<div id="jserr"></div>
<script>
window.addEventListener("error", e => {
  const d = document.getElementById("jserr");
  d.style.display = "block";
  d.style.cssText = "display:block;padding:20px;color:red;background:#fff;font-family:monospace;white-space:pre-wrap;position:fixed;top:0;left:0;right:0;z-index:9999;max-height:50vh;overflow:auto";
  d.textContent += "[error] " + e.message + " at " + e.filename + ":" + e.lineno + "\n";
});
</script>

<div id="app" x-data="portal()" x-init="document.getElementById('loading').remove(); init()"
     x-effect="document.title = pageTitle()" x-cloak>

  <!-- Splash — first load / hard refresh, before initial data arrives -->
  <div class="splash" x-show="!appReady" x-transition.opacity.duration.300ms x-cloak>
    <span class="muse-mascot lg splash-mascot">
      <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
    </span>
    <div class="splash-logo">muse<span class="accent">·lab</span></div>
    <div class="splash-text" x-text="t('splash.greet')"></div>
    <div class="splash-hint" x-show="splashHint" x-text="splashHint"></div>
  </div>

  <!-- Connection banner — slim sticky bar when backend is briefly unreachable -->
  <div class="conn-banner" x-show="connState !== 'ok'"
       :class="{ reconnecting: connState === 'reconnecting',
                  reconnected:  connState === 'reconnected' }"
       x-transition.opacity x-cloak>
    <span x-show="connState === 'reconnecting'" x-text="t('conn.reconnecting')"></span>
    <span x-show="connState === 'reconnected'"  x-text="t('conn.reconnected')"></span>
  </div>

  <!-- 登录 — 用 template+x-if 而不是 x-show，让 input type=password 在认证后
       真的从 DOM 移除。否则它一直挂着，iOS 17+ 会把整页识别成"账户上下文"，
       chat textarea 一聚焦就被 AutoFill 快译条占一行。 -->
  <template x-if="!authed && appReady">
    <div class="login">
      <span class="muse-mascot lg" :class="{'greet': mascotGreet}">
        <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
      </span>
      <h2 class="login-logo">muse<span class="accent">lab</span></h2>
      <p class="login-tagline" x-text="t('login.tagline')"></p>
      <p class="login-sub" x-html="t('login.sub')"></p>
      <input type="password" :placeholder="t('login.token_placeholder')" x-model="tokenInput"
             @keydown.enter="login()" autofocus />
      <button @click="login()" class="btn-primary" x-text="t('login.go')"></button>
      <p class="err" x-text="loginErr"></p>
      <p class="login-hint" x-show="loginErr" x-text="t('login.hint_on_err')"></p>
    </div>
  </template>

  <!-- 主界面 -->
  <div class="layout" x-show="authed" :style="layoutStyle()" :data-mobile-tab="mobileTab">

    <!-- ============ 左：文件树 ============ -->
    <aside class="pane files" :class="{'pane-hidden': !leftOpen}">
      <header class="pane-head">
        <span class="pane-title"><span class="icon"><svg><use href="#i-folder"/></svg></span><span x-text="t('pane.files')"></span></span>
        <span class="spacer"></span>
        <button @click="$refs.upload.click()" class="icon-btn" :title="t('btn.upload')"><svg><use href="#i-upload"/></svg></button>
        <button @click="mkdirPrompt()" class="icon-btn" :title="t('btn.new_dir')"><svg><use href="#i-folder-plus"/></svg></button>
        <button @click="toggleHidden()" class="icon-btn"
                :class="showHidden ? 'active' : ''"
                :title="showHidden ? t('btn.hide_hidden') : t('btn.show_hidden')">
          <svg><use href="#i-eye"/></svg>
        </button>
        <button @click="reloadTree()" class="icon-btn" :title="t('btn.refresh')"><svg><use href="#i-refresh"/></svg></button>
        <button @click="toggleTheme()" class="icon-btn" :title="theme==='light' ? t('btn.theme_dark') : t('btn.theme_light')">
          <svg x-show="theme==='light'"><use href="#i-moon"/></svg>
          <svg x-show="theme!=='light'"><use href="#i-sun"/></svg>
        </button>
        <input type="file" x-ref="upload" style="display:none" @change="upload($event)" />
      </header>
      <div class="searchbar">
        <div class="searchbar-wrap">
          <span class="searchbar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" :placeholder="t('files.search_placeholder')" x-model="searchQ"
                 @input.debounce.300ms="doSearch()" />
        </div>
        <button x-show="searchMode" @click="clearSearch()" class="icon-btn" :title="lang==='zh'?'清空':'Clear'"><svg><use href="#i-x"/></svg></button>
      </div>

      <!-- "打开的文件" — 当前打开的 preview tab 列表。
           Row layout: grid (icon · name · ×) — name 中段 truncate，× 不重叠。
           高度调节：底部 splitter bar（draggable），不依赖 CSS resize 手柄。 -->
      <div class="open-files" x-show="!searchMode && tabs.length > 0">
        <div class="open-files-head">
          <button class="open-files-toggle"
                  :title="openFilesCollapsed ? (lang==='zh'?'展开':'Expand') : (lang==='zh'?'折叠':'Collapse')"
                  @click="openFilesCollapsed = !openFilesCollapsed">
            <svg x-show="!openFilesCollapsed"><use href="#i-chevron-down"/></svg>
            <svg x-show="openFilesCollapsed"><use href="#i-chevron-right"/></svg>
          </button>
          <span class="open-files-label"
                x-text="(lang==='zh'?'打开的文件 ':'Open ') + '(' + tabs.length + ')'"></span>
          <button class="open-files-close-all icon-btn sm"
                  @click="tabs = []; selected = ''; savePrefs()"
                  :title="lang==='zh'?'关闭全部':'Close all'"><svg><use href="#i-x"/></svg></button>
        </div>
        <ul class="open-files-list" x-show="!openFilesCollapsed"
            :style="openFilesHeight ? `height: ${openFilesHeight}px; max-height: none` : ''">
          <template x-for="t in tabs" :key="'opf-' + t.path">
            <li :class="{sel: selected === t.path}"
                :data-ext="fileExtClass({path: t.path, name: t.name, is_dir: false})"
                @click="switchTab(t.path)"
                @contextmenu.prevent="showPreviewTabMenu($event, t.path)"
                :title="t.path">
              <span class="icon"><svg><use :href="iconRef({name: t.name, is_dir: false})"/></svg></span>
              <span class="name" x-text="t.name"></span>
              <button class="open-files-x"
                      @click.stop="closeTab(t.path)"
                      :title="lang==='zh'?'关闭':'Close'">×</button>
            </li>
          </template>
        </ul>
        <!-- Splitter — drag to resize the list height. -->
        <div class="open-files-splitter"
             x-show="!openFilesCollapsed"
             @mousedown="startOpenFilesResize($event)"
             :title="lang==='zh'?'拖动调整高度':'Drag to resize'"></div>
      </div>

      <!-- File tree — wrapped so the root-path bar can sticky at the top of
           the scrollable area (always visible while user scrolls deep into
           subdirs). The wrap + bar also act as a visual divider against the
           "Open files" section above. -->
      <div class="filelist-wrap" x-show="!searchMode">
        <div class="filelist-sticky-root"
             :title="contextInfo.archive_root || ''"
             @click="copyRootPath()">
          <span class="icon"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12L12 3l9 9M5 10v10h14V10"/></svg></span>
          <span class="path" x-text="rootDisplay()"></span>
        </div>
      <ul class="filelist">
        <template x-for="n in visible" :key="n.path">
          <li :class="{file: !n.is_dir, dir: n.is_dir, sel: selected===n.path, 'drag-over': dragOver===n.path}"
              :style="`padding-left:${10 + n.depth*14}px; --depth: ${n.depth}`"
              :data-path="n.path"
              :data-depth="n.depth"
              :data-ext="fileExtClass(n)"
              draggable="true"
              @dragstart="onTreeNodeDragStart($event, n)"
              @dragend="dragOver=''"
              @click="onNodeClick(n)"
              @contextmenu.prevent="openCtxMenu($event, n)"
              @dragover.prevent="onTreeNodeDragOver($event, n)"
              @dragleave="dragOver=''"
              @drop.prevent="onDrop($event, n)">
            <span class="caret">
              <svg x-show="n.is_dir && expanded.has(n.path)"><use href="#i-chevron-down"/></svg>
              <svg x-show="n.is_dir && !expanded.has(n.path)"><use href="#i-chevron-right"/></svg>
            </span>
            <span class="icon"><svg><use :href="iconRef(n)"/></svg></span>
            <span class="name" x-text="n.name" :title="n.name"></span>
            <!-- VSCode-style inline actions on directory rows. Hidden by
                 default; revealed on hover (desktop) or always faded
                 (touch — no hover). @click.stop so the action doesn't
                 also collapse/expand the row. -->
            <span class="tree-actions" x-show="n.is_dir">
              <button class="tree-action" type="button"
                      @click.stop="doNewFile(n)"
                      :title="lang==='zh' ? '在此目录新建文件' : 'New file here'"
                      aria-label="New file">+</button>
              <button class="tree-action" type="button"
                      @click.stop="openCtxMenu($event, n)"
                      :title="lang==='zh' ? '更多操作（重命名 / 删除 / 上传 / 新建目录…）' : 'More (rename / delete / upload / new folder…)'"
                      aria-label="More">⋯</button>
            </span>
            <span class="size" x-show="!n.is_dir" x-text="fmtSize(n.size)"></span>
          </li>
        </template>
      </ul>
      </div>

      <!-- 搜索结果 -->
      <div class="search-results" x-show="searchMode">
        <div class="search-section" x-show="searchHits.length">
          <div class="search-heading">
            <span class="icon"><svg><use href="#i-file"/></svg></span>
            <span x-text="lang==='zh' ? '文件名' : 'File names'"></span>
            <span class="count" x-text="'('+searchHits.length+(searchTruncated?'+':'')+')'"></span>
          </div>
          <template x-for="n in searchHits" :key="'name-'+n.path">
            <div :class="'srow ' + (selected===n.path?'sel':'')" @click="onSearchClick(n)">
              <span class="icon"><svg><use :href="iconRef(n)"/></svg></span>
              <div class="body">
                <div class="name" x-text="n.name"></div>
                <div class="path-hint" x-text="n.path"></div>
              </div>
            </div>
          </template>
        </div>
        <div class="search-section" x-show="grepHits.length">
          <div class="search-heading">
            <span class="icon"><svg><use href="#i-file-search"/></svg></span>
            <span x-text="lang==='zh' ? '内容' : 'Content'"></span>
            <span class="count" x-text="'('+grepHits.length+(grepTruncated?'+':'')+')'"></span>
          </div>
          <template x-for="(h,i) in grepHits" :key="'grep-'+i">
            <div :class="'srow ' + (selected===h.path?'sel':'')" @click="openByPath(h.path)">
              <span class="icon"><svg><use :href="iconRef(h)"/></svg></span>
              <div class="body">
                <div class="name" x-text="h.name + ':' + h.line"></div>
                <div class="snippet" x-text="h.snippet"></div>
                <div class="path-hint" x-text="h.path"></div>
              </div>
            </div>
          </template>
        </div>
        <div class="hint-row" x-show="!searchHits.length && !grepHits.length && !searching" x-text="t('files.empty_search')"></div>
        <div class="hint-row" x-show="searching" x-text="t('files.searching')"></div>
      </div>
    </aside>

    <!-- resizer between files and preview -->
    <div class="resizer" :class="{'pane-hidden': !leftOpen}" @mousedown="startResize('left', $event)"></div>

    <!-- ============ 中：预览 ============ -->
    <section class="pane preview">
      <header class="pane-head">
        <button @click="leftOpen=!leftOpen; savePrefs()" class="icon-btn" :title="leftOpen?t('btn.hide_left'):t('btn.show_left')">
          <svg x-show="leftOpen"><use href="#i-chevron-left"/></svg>
          <svg x-show="!leftOpen"><use href="#i-chevron-right"/></svg>
        </button>
        <span class="pane-title" x-text="selected ? selected.split('/').pop() : t('pane.preview')"></span>
        <span class="spacer"></span>
        <button x-show="selected" @click="reloadPreview()" class="icon-btn"
                :title="lang==='zh' ? '刷新预览' : 'Reload preview'">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
        <button x-show="selected && isEditable(selected)" @click="toggleEdit()" class="icon-btn"
                :title="editing ? t('btn.preview') : t('btn.edit')">
          <svg x-show="!editing"><use href="#i-edit"/></svg>
          <svg x-show="editing"><use href="#i-eye"/></svg>
        </button>
        <button x-show="editing" @click="saveEdit()" class="btn-primary" style="padding:4px 12px;font-size:12px" x-text="t('btn.save')"></button>
        <button x-show="selected" @click="insertFileMention(selected)" class="icon-btn" :title="t('btn.at_mention')"><svg><use href="#i-at"/></svg></button>
        <a x-show="selected" :href="downloadUrl(selected)" :download="selected.split('/').pop()" class="icon-btn" :title="t('btn.download')"><svg><use href="#i-download"/></svg></a>
        <button @click="rightOpen=!rightOpen; savePrefs()" class="icon-btn" :title="rightOpen?t('btn.hide_right'):t('btn.show_right')">
          <svg x-show="rightOpen"><use href="#i-chevron-right"/></svg>
          <svg x-show="!rightOpen"><use href="#i-chevron-left"/></svg>
        </button>
      </header>
      <!-- Tab bar (VSCode-style multi-file) -->
      <div class="tab-bar" x-show="tabs.length">
        <template x-for="t in tabs" :key="t.path">
          <div :class="'tab' + (selected===t.path ? ' active' : '') + (previewDragOverPath===t.path ? ' drag-over' : '')"
               draggable="true"
               :data-path="t.path"
               @dragstart="onPreviewTabDragStart($event, t.path)"
               @dragover.prevent="onPreviewTabDragOver($event, t.path)"
               @dragleave="onPreviewTabDragLeave(t.path)"
               @drop.prevent="onPreviewTabDrop($event, t.path)"
               @dragend="onPreviewTabDragEnd()"
               @click="switchTab(t.path)"
               @contextmenu.prevent="showPreviewTabMenu($event, t.path)"
               @auxclick.prevent="closeTab(t.path)"
               :title="t.path">
            <span class="icon"><svg><use :href="iconRef({name: t.name, is_dir: false})"/></svg></span>
            <span class="tab-name" x-text="t.name"></span>
            <button class="tab-close" @click.stop="closeTab(t.path)" :title="lang==='zh'?'关闭（中键也可）':'Close (middle-click also)'">×</button>
          </div>
        </template>
      </div>

      <!-- Preview tab right-click menu. Uses a fullscreen overlay to catch
           "outside" clicks instead of Alpine's @click.outside — the latter
           was firing on the same right-click event sequence and dismissing
           the menu instantly. -->
      <template x-if="previewTabCtxMenu">
        <div class="ctx-menu-overlay"
             @click="previewTabCtxMenu = null"
             @contextmenu.prevent="previewTabCtxMenu = null"
             @keydown.escape.window="previewTabCtxMenu = null">
          <div class="tab-ctx-menu"
               :style="previewTabCtxMenuStyle()"
               @click.stop @contextmenu.prevent.stop>
            <button @click="previewTabMenuAction('close')"
                    x-text="lang==='zh' ? '关闭' : 'Close'"></button>
            <button @click="previewTabMenuAction('closeOthers')"
                    x-text="lang==='zh' ? '关闭其他' : 'Close others'"></button>
            <button @click="previewTabMenuAction('closeRight')"
                    x-text="lang==='zh' ? '关闭右侧标签' : 'Close to the right'"></button>
            <button @click="previewTabMenuAction('closeAll')"
                    x-text="lang==='zh' ? '关闭全部' : 'Close all'"></button>
            <hr/>
            <button @click="previewTabMenuAction('reveal')"
                    x-text="lang==='zh' ? '在文件树定位' : 'Reveal in tree'"></button>
            <button @click="previewTabMenuAction('mention')"
                    x-text="lang==='zh' ? '@ 引用到 chat' : '@-mention in chat'"></button>
            <button @click="previewTabMenuAction('copyPath')"
                    x-text="lang==='zh' ? '复制路径' : 'Copy path'"></button>
          </div>
        </div>
      </template>

      <div class="preview-body"
           :class="{ 'drag-hover': previewDragHover }"
           @dragover.prevent="previewDragHover = true"
           @dragenter.prevent="previewDragHover = true"
           @dragleave.prevent="previewDragHover = false"
           @drop.prevent="onPreviewDrop($event)">
        <!-- Drag overlay — visible when user drags a file in from OS. -->
        <div class="preview-drop-overlay" x-show="previewDragHover" x-transition.opacity>
          <div class="preview-drop-inner">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <div x-text="lang==='zh' ? '放下以上传 / 打开' : 'Drop to upload / open'"></div>
          </div>
        </div>
        <div x-show="editing" class="editor-wrap">
          <div x-ref="cmHost" class="editor-cm"></div>
          <div class="editor-status">
            <span class="seg">Ln <b x-text="cmStatus.line"></b>, Col <b x-text="cmStatus.col"></b></span>
            <span class="seg" x-show="cmStatus.sel" x-text="(lang==='zh'?'(选 ':'(sel ') + cmStatus.sel + ')'"></span>
            <span class="spacer"></span>
            <span class="seg" x-text="cmStatus.lines + (lang==='zh' ? ' 行' : ' lines')"></span>
            <span class="seg" x-text="fmtSize(cmStatus.chars) + ' / ' + cmStatus.chars + (lang==='zh' ? ' 字符' : ' chars')"></span>
            <span class="seg" x-text="cmStatus.mode"></span>
            <span class="seg" :class="cmStatus.dirty ? 'dirty' : ''" x-text="cmStatus.dirty ? (lang==='zh' ? '● 未保存' : '● Unsaved') : (lang==='zh' ? '○ 已保存' : '○ Saved')"></span>
          </div>
        </div>
        <div x-show="!editing && previewMode==='md'" class="markdown" x-html="renderedMd"></div>
        <pre x-show="!editing && previewMode==='text'" class="text"><code :class="'language-' + previewLang" x-text="rawText"></code></pre>
        <!-- src 仅在该模式激活时才指向真实 URL，否则空字符串/about:blank，
             避免隐藏元素请求 raw URL 触发对 md/txt 的下载。 -->
        <iframe x-show="!editing && previewMode==='html'"
                :src="previewMode==='html' ? rawUrl(selected) : 'about:blank'"
                class="frame" sandbox="allow-scripts"></iframe>
        <img x-show="!editing && previewMode==='img'"
             :src="previewMode==='img' ? rawUrl(selected) : ''"
             class="preview-img" />
        <iframe x-show="!editing && previewMode==='pdf'"
                :src="previewMode==='pdf' ? rawUrl(selected) : 'about:blank'"
                class="frame"></iframe>

        <!-- xlsx preview: per-sheet tabs + scrollable table. Backend caps to
             500 rows × 50 cols per sheet and 20 sheets; truncation surfaces
             as a small banner below the table. Formulas are NOT evaluated —
             cells show the last-cached value from the spreadsheet app. -->
        <div x-show="!editing && previewMode==='xlsx'" class="xlsx-preview">
          <div class="xlsx-tabs" x-show="xlsxSheets.length > 1">
            <template x-for="sh in xlsxSheets" :key="sh.name">
              <button class="xlsx-tab"
                      :class="{ active: xlsxActive === sh.name }"
                      @click="xlsxActive = sh.name"
                      x-text="sh.name"></button>
            </template>
            <span class="xlsx-trunc-note" x-show="xlsxSheetsTruncated"
                  x-text="lang==='zh' ? '（仅显示前 20 个 sheet）' : '(showing first 20 sheets only)'"></span>
          </div>
          <template x-for="sh in xlsxSheets" :key="sh.name">
            <div class="xlsx-sheet-wrap" x-show="xlsxActive === sh.name">
              <div class="xlsx-scroll">
                <table class="xlsx-table">
                  <tbody>
                    <template x-for="(row, ri) in sh.rows" :key="ri">
                      <tr>
                        <td class="xlsx-rownum" x-text="ri + 1"></td>
                        <template x-for="(cell, ci) in row" :key="ci">
                          <td x-text="cell" :title="cell"></td>
                        </template>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="xlsx-meta" x-show="sh.rows_truncated || sh.cols_truncated">
                <span x-show="sh.rows_truncated"
                      x-text="lang==='zh'
                        ? `（行数超过 ${xlsxLimits && xlsxLimits.max_rows} 已截断）`
                        : `(rows truncated at ${xlsxLimits && xlsxLimits.max_rows})`"></span>
                <span x-show="sh.cols_truncated"
                      x-text="lang==='zh'
                        ? `（列数超过 ${xlsxLimits && xlsxLimits.max_cols} 已截断）`
                        : `(cols truncated at ${xlsxLimits && xlsxLimits.max_cols})`"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- CSV preview — same table style as xlsx, but with pagination
             since CSV files in the wild are often million-row exports. -->
        <div x-show="!editing && previewMode==='csv'" class="xlsx-preview csv-preview">
          <div class="csv-toolbar">
            <button class="btn-text sm" @click="csvPrevPage()"
                    :disabled="csvOffset === 0 || csvLoading"
                    x-text="lang==='zh' ? '← 上页' : '← Prev'"></button>
            <span class="csv-range" x-show="csvData"
                  x-text="(csvOffset + 1) + '–' + csvWindowEnd() + ' / ' + (csvData && csvData.total_rows || 0)"></span>
            <button class="btn-text sm" @click="csvNextPage()"
                    :disabled="!csvData || csvWindowEnd() >= (csvData && csvData.total_rows || 0) || csvLoading"
                    x-text="lang==='zh' ? '下页 →' : 'Next →'"></button>
            <span class="csv-meta" x-show="csvData"
                  x-text="(lang==='zh' ? '分隔符: ' : 'Delim: ')
                          + (csvData && csvData.delimiter === '\t' ? 'TAB' : (csvData && csvData.delimiter || ','))"></span>
            <span class="csv-meta" x-show="csvData && csvData.cols_truncated"
                  x-text="lang==='zh' ? '（列数已截断）' : '(cols truncated)'"></span>
          </div>
          <div class="xlsx-scroll" x-show="csvData">
            <table class="xlsx-table">
              <thead x-show="csvData && csvData.has_header && csvData.header && csvData.header.length">
                <tr>
                  <th class="xlsx-rownum"></th>
                  <template x-for="(h, ci) in (csvData && csvData.header || [])" :key="ci">
                    <th x-text="h" :title="h"></th>
                  </template>
                </tr>
              </thead>
              <tbody>
                <template x-for="(row, ri) in (csvData && csvData.rows || [])" :key="ri">
                  <tr>
                    <td class="xlsx-rownum"
                        x-text="csvOffset + ri + 1 + (csvData && csvData.has_header ? 1 : 0)"></td>
                    <template x-for="(cell, ci) in row" :key="ci">
                      <td x-text="cell" :title="cell"></td>
                    </template>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="csv-loading" x-show="csvLoading"
               x-text="lang==='zh' ? '加载中…' : 'Loading…'"></div>
        </div>

        <div x-show="!editing && previewMode==='unsupported'" class="empty">
          <span class="icon"><svg><use href="#i-file"/></svg></span>
          <div class="empty-title" x-text="lang==='zh' ? '不支持预览' : 'Preview not supported'"></div>
          <div class="empty-hint">
            <span x-text="lang==='zh' ? '该文件类型无法在浏览器中预览。' : 'This file type cannot be previewed in browser. '"></span>
            <a :href="downloadUrl(selected)" x-text="lang==='zh' ? '点这里下载' : 'Download it instead'"></a>。
          </div>
        </div>
        <div x-show="!selected" class="brand-empty">
          <span class="muse-mascot lg" :class="{'greet': mascotGreet}" @click="cycleMascot()">
            <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
          </span>
          <div class="brand-logo">muse<span class="accent">·lab</span></div>
          <div class="brand-tagline" x-text="t('empty.preview_tagline')"></div>
          <!-- Quick actions — surface the most useful things when no file is selected -->
          <div class="preview-quick-actions">
            <button class="preview-action" @click="quickNewNote()">
              <span class="icon"><svg><use href="#i-edit"/></svg></span>
              <span x-text="t('preview.action_new_note')"></span>
            </button>
            <button class="preview-action" @click="$refs.upload?.click()">
              <span class="icon"><svg><use href="#i-upload"/></svg></span>
              <span x-text="t('preview.action_upload')"></span>
            </button>
          </div>
          <div class="brand-tips">
            <div class="brand-tip" x-text="t('empty.preview_tip1')"></div>
            <div class="brand-tip"><span class="kbd">@</span><span x-text="t('empty.preview_tip2')"></span></div>
            <div class="brand-tip" x-text="t('empty.preview_tip3')"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- resizer between preview and chat -->
    <div class="resizer" :class="{'pane-hidden': !rightOpen}" @mousedown="startResize('right', $event)"></div>

    <!-- ============ 右：chat ============ -->
    <aside class="pane chat" :class="{'pane-hidden': !rightOpen}">
      <header class="pane-head">
        <span class="pane-title">
          <span class="muse-mascot sm" :class="{'greet': mascotGreet, 'is-streaming': streaming}"
                @click="cycleMascot()" :title="mascotLabel() + (lang==='zh'?'（点击换一位）':' (click for next muse)')">
            <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
          </span>
          <span x-text="t('pane.chat')"></span>
        </span>
        <span class="spacer"></span>
        <!-- CLAUDE.md status chip — only shown when MISSING (intake creates it
             by default, so the "present" state is implicit). When missing,
             clicking opens a help dialog with how-to-fix instructions. -->
        <span class="ctx-chip warn"
              x-show="contextInfo._fetched && !contextInfo.claude_md_exists"
              :title="claudeMdChipTitle()"
              @click="openClaudeMdHelp()"
              x-text="lang==='zh' ? '⚠ 未配档案' : '⚠ no archive'"></span>
        <span x-show="mcp.servers.length" class="mcp-badge"
              :title="(lang==='zh'?'MCP 服务: ':'MCP servers: ') + mcp.servers.map(s=>s.name).join(', ')">
          🔌 <span x-text="mcp.servers.length"></span>
        </span>
        <span class="cost-badge"
              :class="{ 'over-budget': stats.budget_used_pct >= 90 }"
              :title="costBadgeTitle()"
              x-text="tokenBadgeText()"></span>
        <!-- Scheduled-tasks bell — unread badge when any scheduled
             prompt has produced output since the user last opened
             the drawer. Heartbeat keeps the count fresh. -->
        <button @click="openScheduler()" class="icon-btn bell-btn"
                :title="lang==='zh' ? '定时任务' : 'Scheduled tasks'"
                aria-label="Scheduled tasks">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="bell-badge" x-show="scheduler.unreadCount > 0"
                x-text="scheduler.unreadCount > 99 ? '99+' : scheduler.unreadCount"></span>
        </button>
        <!-- Command palette entry — slim icon-btn alongside settings.
             Discoverability comes from the first-run toast (init()) +
             a tooltip showing the keyboard shortcut. Visual weight is
             intentionally low so the palette doesn't read as "chat
             search" — it's app-global. -->
        <button @click="openPalette()" class="icon-btn"
                :title="lang==='zh' ? '命令面板  ⌘K' : 'Command palette  ⌘K'"
                aria-label="Command palette">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button @click="openSettings()" class="icon-btn" :title="t('btn.settings')"><svg><use href="#i-settings"/></svg></button>
      </header>

      <!-- Hairline progress bar (was the prominent ctx-meter strip). The
           text + actions moved into the chat-input toolbar below. Bar stays
           for at-a-glance percentage. Color shifts warn → danger via class. -->
      <div class="ctx-progress"
           :class="{
             warn: sessionUsage.context_used_pct >= 70 && sessionUsage.context_used_pct < 90,
             danger: sessionUsage.context_used_pct >= 90,
             compacting: _compacting,
           }"
           :title="ctxMeterTitle()">
        <div class="ctx-progress-fill"
             :style="`width: ${Math.min(100, sessionUsage.context_used_pct || 0)}%`"></div>
      </div>

      <!-- Context breakdown popup — shows SDK get_context_usage() output
           with per-category token counts so the user can see which slice
           (system prompt / tools / memory / messages / mcp) is dominating. -->
      <div x-show="ctxBreakdown.show"
           @click.outside="ctxBreakdown.show = false"
           x-transition.opacity
           class="ctx-breakdown-pop">
        <div class="ctx-breakdown-head">
          <span x-text="lang==='zh' ? 'Context 拆分（SDK 真值）' : 'Context breakdown'"></span>
          <button class="icon-btn sm"
                  :title="lang==='zh' ? '关闭' : 'Close'"
                  @click="ctxBreakdown.show = false">×</button>
        </div>
        <div x-show="ctxBreakdown.loading" class="ctx-breakdown-body"
             x-text="lang==='zh' ? '查询中…' : 'Loading…'"></div>
        <div x-show="ctxBreakdown.error && !ctxBreakdown.loading"
             class="ctx-breakdown-body err" x-text="ctxBreakdown.error"></div>
        <template x-if="ctxBreakdown.data && !ctxBreakdown.loading">
          <div class="ctx-breakdown-body">
            <div class="ctx-breakdown-summary"
                 x-text="((ctxBreakdown.data.totalTokens||0)/1000).toFixed(1) + 'K / ' + ((ctxBreakdown.data.maxTokens||0)/1000).toFixed(0) + 'K (' + (ctxBreakdown.data.percentage||0).toFixed(1) + '%)'"></div>
            <!-- Stacked bar — shows each category as a colored segment so the
                 user can eyeball "where did 50K go" at a glance. -->
            <div class="ctx-breakdown-stack">
              <template x-for="cat in (ctxBreakdown.data.categories || [])" :key="cat.name">
                <div class="ctx-breakdown-stack-seg"
                     :style="`width: ${ctxCategoryPct(cat)}%; background: ${ctxCategoryColor(cat)}`"
                     :title="cat.name + ' · ' + ctxFormatTokens(cat.tokens)"></div>
              </template>
            </div>
            <template x-for="cat in (ctxBreakdown.data.categories || [])" :key="cat.name">
              <div class="ctx-breakdown-row"
                   :class="{ expandable: ctxRowChildren(cat.name).length, expanded: ctxExpanded[cat.name] }"
                   @click="ctxToggleRow(cat.name)">
                <span class="ctx-breakdown-swatch"
                      :style="`background: ${ctxCategoryColor(cat)}`"></span>
                <span class="ctx-breakdown-name" x-text="cat.name"></span>
                <span class="ctx-breakdown-bar">
                  <span class="ctx-breakdown-bar-fill"
                        :style="`width: ${ctxCategoryPct(cat)}%; background: ${ctxCategoryColor(cat)}`"></span>
                </span>
                <span class="ctx-breakdown-tokens"
                      x-text="ctxFormatTokens(cat.tokens)"></span>
                <span class="ctx-breakdown-caret"
                      x-show="ctxRowChildren(cat.name).length"
                      x-text="ctxExpanded[cat.name] ? '▾' : '▸'"></span>
              </div>
              <template x-if="ctxExpanded[cat.name] && ctxRowChildren(cat.name).length">
                <div class="ctx-breakdown-sub">
                  <template x-for="item in ctxRowChildren(cat.name)" :key="item.name + '-' + item.tokens">
                    <div class="ctx-breakdown-subrow">
                      <span class="ctx-breakdown-subname" x-text="item.name"></span>
                      <span class="ctx-breakdown-subtokens"
                            x-text="ctxFormatTokens(item.tokens)"></span>
                    </div>
                  </template>
                </div>
              </template>
            </template>
            <div class="ctx-breakdown-hint"
                 x-text="lang==='zh' ? '说明：tools / system prompt 是 Claude Code CLI 内置；memoryFiles 是 CLAUDE.md union；messages 含所有历史 + tool_result' : 'Note: tools / system_prompt are CLI built-in; memoryFiles is CLAUDE.md union; messages include full history + tool results'"></div>
          </div>
        </template>
      </div>

      <!-- Tab strip — like VS Code Claude. Each tab is an open session;
           click switches, double-click renames inline, right-click opens
           the context menu (rename / edit prompt / close / delete).
           The picker on the right is the "history" entry point: clicking a
           row promotes that session into a tab. -->
      <!-- Two-container layout: .chat-tabs-list scrolls horizontally when tabs
           overflow; .chat-tabs-actions stays pinned right (new-session + history
           picker always visible regardless of how many tabs are open). -->
      <div class="chat-tabs-wrap">
        <div class="chat-tabs-list" @wheel="onChatTabsWheel($event)">
          <template x-for="tid in openTabIds" :key="tid">
            <div class="chat-tab" :class="{active: tid === currentId, 'drag-over': tabDragOverId === tid}"
                 :data-tid="tid"
                 draggable="true"
                 @dragstart="onTabDragStart($event, tid)"
                 @dragover.prevent="onTabDragOver($event, tid)"
                 @dragleave="onTabDragLeave(tid)"
                 @drop.prevent="onTabDrop($event, tid)"
                 @dragend="onTabDragEnd()"
                 @click="activateTab(tid)"
                 @dblclick="startRenameTab(tid)"
                 @contextmenu.prevent="showTabMenu($event, tid)"
                 @auxclick="onTabAuxClick($event, tid)"
                 :title="tabTitle(tid)">
              <span class="chat-tab-stream-dot"
                    x-show="isTabStreaming(tid)"
                    :title="lang==='zh' ? '该会话正在生成…' : 'Streaming…'"></span>
              <!-- x-show, not x-if — keeps both nodes mounted so a blur on the
                   <input> doesn't unmount the very element dispatching the
                   event (which trips an Alpine null.node bug). -->
              <span class="chat-tab-name ellipsis"
                    x-show="renamingTabId !== tid"
                    x-text="(sessions.find(s => s.id === tid)?.name) || '…'"></span>
              <input class="chat-tab-rename-input" type="text" x-model="renameDraft"
                     :data-tid="tid"
                     x-show="renamingTabId === tid"
                     @click.stop @dblclick.stop
                     @blur="commitRenameTab()"
                     @keydown.enter.prevent="commitRenameTab()"
                     @keydown.escape.prevent="cancelRenameTab()" />
              <!-- Kebab menu — only shown on mobile (CSS @media). Desktop uses
                   right-click which mobile browsers don't reliably synthesize. -->
              <button class="chat-tab-kebab" @click="showTabMenu($event, tid)"
                      :title="lang==='zh' ? '更多操作' : 'More'">⋮</button>
              <button class="chat-tab-close" @click="closeChatTab(tid, $event)"
                      :title="lang==='zh' ? '关闭 tab（中键也可）' : 'Close tab (middle-click also)'">×</button>
            </div>
          </template>
        </div>
        <div class="chat-tabs-actions">
          <button class="chat-tab-new" @click="newSession()"
                  :title="t('btn.new_session')">+</button>
          <!-- History picker — collapses old sessions into a dropdown to avoid
               a wall of tabs. Clicking a row opens it as a tab via openTab(). -->
          <div class="session-picker chat-tab-history" @click.outside="sessionPickerOpen = false">
            <button class="chat-tab-history-btn" @click="toggleHistoryPicker($event)" type="button"
                    :title="lang==='zh' ? '打开历史会话' : 'Open history session'">
              <svg><use href="#i-folder"/></svg>
            </button>
            <div x-show="sessionPickerOpen" x-transition.opacity.duration.150ms
                 class="session-picker-pop"
                 :style="historyPickerStyle">
              <input class="session-picker-search"
                     type="text"
                     x-model="sessionPickerSearch"
                     x-ref="sessionPickerSearchInput"
                     :placeholder="lang==='zh' ? '搜索会话名…' : 'Search sessions…'"
                     @keydown.escape="sessionPickerOpen = false" />
              <template x-for="g in groupedFilteredSessions()" :key="g.key">
                <div class="session-picker-group">
                  <div class="session-picker-group-label" x-text="g.label"></div>
                  <template x-for="s in g.items" :key="s.id">
                    <div class="session-picker-row"
                         :class="historyRowClass(s.id) + (s.pinned ? ' pinned' : '')"
                         @click="pickerOpenSession(s.id)"
                         @contextmenu.prevent="pickerRowMenu($event, s.id)">
                      <button class="session-picker-pin"
                              :class="{ active: s.pinned }"
                              @click.stop="togglePinSession(s.id)"
                              :title="s.pinned ? (lang==='zh'?'取消置顶':'Unpin') : (lang==='zh'?'置顶':'Pin to top')">
                        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2">
                          <line x1="12" y1="17" x2="12" y2="22"/>
                          <path d="M5 17h14l-1.5-5H6.5L5 17z"/>
                          <path d="M9 12V5h6v7"/>
                        </svg>
                      </button>
                      <span class="ellipsis" x-text="s.name"></span>
                      <span class="session-picker-count" x-text="s.message_count"></span>
                      <button class="session-picker-kebab"
                              @click="pickerRowMenu($event, s.id)"
                              :title="lang==='zh' ? '更多操作' : 'More'">⋮</button>
                      <button class="session-picker-del"
                              @click="pickerDeleteSession(s.id, $event)"
                              :title="lang==='zh' ? '删除此会话' : 'Delete this session'">×</button>
                    </div>
                  </template>
                </div>
              </template>
              <div x-show="filteredSessions().length === 0" class="session-picker-empty"
                   x-text="lang==='zh' ? (sessionPickerSearch ? '没有匹配' : '暂无会话') : (sessionPickerSearch ? 'No match' : 'No sessions')"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab context menu (right-click). Stored in `tabCtxMenu` to avoid
           clashing with the file-tree's `ctxMenu` data (different shape). -->
      <template x-if="tabCtxMenu">
        <div class="tab-ctx-menu"
             :style="tabCtxMenuStyle()"
             @click.outside="closeTabMenu()"
             @keydown.escape.window="closeTabMenu()">
          <button @click="menuRename(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '重命名' : 'Rename'"></button>
          <button @click="menuEditPrompt(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '编辑 system prompt' : 'Edit system prompt'"></button>
          <button @click="menuClose(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '关闭 tab' : 'Close tab'"></button>
          <button @click="menuExportMarkdown(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '导出为 Markdown' : 'Export as Markdown'"></button>
          <hr/>
          <button class="danger" @click="menuDelete(tabCtxMenu && tabCtxMenu.id)"
                  x-text="lang==='zh' ? '删除会话' : 'Delete session'"></button>
        </div>
      </template>

      <!-- The legacy .session-bar (model + permission + thinking selectors)
           moved to the chat-input toolbar at the bottom (VSCode-style). -->

      <div class="chat-scroll-wrap">
        <div class="chat-body" x-ref="chatBody" @scroll="onChatScroll()" @click="onChatClick($event)">
          <!-- Shimmer skeleton while loadSession is in-flight. Without
               this, switching to a long-history session briefly shows the
               brand-empty onboarding cards as if it were a new session. -->
          <div x-show="messagesLoading && !messages.length" class="chat-skeleton" aria-hidden="true">
            <template x-for="i in 3" :key="i">
              <div class="chat-skeleton-msg">
                <div class="chat-skeleton-avatar"></div>
                <div class="chat-skeleton-bubble">
                  <div class="chat-skeleton-line"></div>
                  <div class="chat-skeleton-line"></div>
                  <div class="chat-skeleton-line"></div>
                </div>
              </div>
            </template>
          </div>
          <div x-show="!messages.length && !messagesLoading" class="brand-empty chat-empty">
            <span class="muse-mascot lg" :class="{'greet': mascotGreet}" @click="cycleMascot()">
              <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
            </span>
            <div class="brand-logo small">Muse · <span x-text="lang==='zh' ? mascot().zhName : mascot().greek"></span></div>
            <div class="brand-tagline">
              <span class="muse-domain" x-text="lang==='zh' ? mascot().domain.zh : mascot().domain.en"></span>
              · <span x-text="t('chat.runs_on')"></span> <span x-text="currentModelLabel()"></span>
            </div>

            <!-- Onboarding cards — only one shows at a time, in priority order:
                 1. no provider auth → "Set up a model before chatting"
                 2. no CLAUDE.md     → "Muse doesn't know you yet"
                 3. archive empty    → "Drop your first document"
                 4. all set          → suggested first questions / skill chips -->
            <template x-if="contextInfo._fetched && !contextInfo.has_any_provider">
              <div class="onboard-card warn">
                <div class="onboard-card-title" x-text="t('onboard.no_provider_title')"></div>
                <div class="onboard-card-body" x-text="t('onboard.no_provider_body')"></div>
                <button class="btn-primary" @click="openSettings()" x-text="t('onboard.no_provider_cta')"></button>
              </div>
            </template>
            <template x-if="contextInfo._fetched && contextInfo.has_any_provider && !contextInfo.claude_md_exists">
              <div class="onboard-card warn">
                <div class="onboard-card-title" x-text="t('onboard.no_claude_md_title')"></div>
                <div class="onboard-card-body" x-text="t('onboard.no_claude_md_body')"></div>
                <button class="btn-primary" @click="openClaudeMdHelp()" x-text="t('onboard.no_claude_md_cta')"></button>
              </div>
            </template>
            <template x-if="contextInfo.has_any_provider && contextInfo.claude_md_exists && contextInfo.archive_empty">
              <div class="onboard-card">
                <div class="onboard-card-title" x-text="t('onboard.empty_archive_title')"></div>
                <div class="onboard-card-body" x-text="t('onboard.empty_archive_body')"></div>
                <div class="onboard-subdirs">
                  <template x-for="sub in onboardingSubdirs()" :key="sub.name">
                    <div class="onboard-subdir">
                      <span class="onboard-subdir-name mono" x-text="sub.name + '/'"></span>
                      <span class="onboard-subdir-hint" x-text="sub.hint"></span>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <template x-if="contextInfo.has_any_provider && contextInfo.claude_md_exists && !contextInfo.archive_empty">
              <div class="onboard-card calm">
                <div class="onboard-card-head">
                  <div class="onboard-card-title" x-text="t('onboard.ready_title')"></div>
                  <button class="onboard-shuffle"
                          @click="shuffleInspirePrompts()"
                          :title="lang==='zh' ? '换一批' : 'Shuffle'"
                          aria-label="Shuffle">
                    <svg viewBox="0 0 24 24" width="14" height="14"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="23 4 23 10 17 10"/>
                      <polyline points="1 20 1 14 7 14"/>
                      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                  </button>
                </div>
                <div class="onboard-suggestions">
                  <template x-for="(q, i) in onboardingPrompts()" :key="i + '|' + q">
                    <button class="onboard-suggestion" @click="useSuggestedPrompt(q)" x-text="q"></button>
                  </template>
                </div>
                <!-- Skill triggers — surface what the loaded skills can do -->
                <template x-if="settings.skills.length">
                  <div class="onboard-skills">
                    <div class="onboard-skills-label" x-text="t('onboard.skill_hint')"></div>
                    <div class="onboard-skills-chips">
                      <template x-for="sk in skillSuggestions()" :key="sk.name">
                        <button class="skill-chip" @click="useSuggestedPrompt(sk.prompt)"
                                :title="sk.description">
                          <span class="skill-chip-icon">🧩</span>
                          <span x-text="sk.label"></span>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <div class="brand-tips">
              <div class="brand-tip"><span x-text="t('chat.empty_tip1')"></span> <span class="kbd">Enter</span></div>
              <div class="brand-tip"><span class="kbd">@</span><span x-text="t('chat.empty_tip2')"></span></div>
              <div class="brand-tip" x-text="t('chat.empty_tip3')"></div>
            </div>
          </div>
          <template x-for="(m,i) in messages" :key="m._k || ((currentId || 'init') + '-' + i)">
            <div :class="'msg ' + m.role">
              <!-- Compact-summary pill: SDK returns the post-/compact summary as
                   a regular user/assistant message; we mark its UUID via the
                   _is_compact_summary flag (detected by reading isCompactSummary
                   from the raw CLI JSONL). Render as a centered pill above the
                   message text so the user sees "this is the summary, not the
                   original history." -->
              <div x-show="m._is_compact_summary" class="compact-summary-pill">
                <span x-text="lang==='zh' ? '📦 上方对话已压缩 · 以下为摘要' : '📦 Conversation compacted · summary below'"></span>
              </div>
              <!-- Compact-summary messages: render only the pill above, hide
                   the bubble. The actual content (CLI's "This session is
                   being continued from a previous conversation..." preamble)
                   is internal CLI protocol — users shouldn't see it. -->
              <div x-show="m.role==='user' && !m._is_compact_summary" class="msg-row">
                <span class="msg-avatar user-avatar" x-text="userAvatarText()"></span>
                <div class="bubble user-bubble">
                  <template x-if="(m.images && m.images.length) || (m.docs && m.docs.length)"><div class="user-msg-imgs"><template x-for="(im, ii) in (m.images || [])" :key="'i'+ii"><img class="user-msg-img" :src="im.preview || ''" alt="" @click="openLightbox(im.preview)" :title="lang==='zh'?'点击放大':'Click to enlarge'" /></template><template x-for="(doc, di) in (m.docs || [])" :key="'d'+di"><span class="user-msg-doc" :title="doc.name"><svg><use href="#i-file-text"/></svg><span x-text="doc.name"></span></span></template></div></template>
                  <template x-if="editingMsgUuid !== m.uuid"><span class="user-msg-text" x-text="m.text"></span></template>
                  <template x-if="editingMsgUuid === m.uuid">
                    <div class="user-msg-edit">
                      <textarea class="user-msg-edit-ta" x-model="editingMsgDraft" @keydown.escape.stop="cancelEditMsg()" @keydown.ctrl.enter.prevent.stop="saveEditMsg()" @keydown.meta.enter.prevent.stop="saveEditMsg()"></textarea>
                      <div class="user-msg-edit-actions">
                        <button class="btn-text" @click="cancelEditMsg()" x-text="t('btn.cancel')"></button>
                        <button class="btn-primary" :disabled="editingMsgSaving" @click="saveEditMsg()" x-text="editingMsgSaving ? t('msg.edit_saving') : t('msg.edit_save')"></button>
                      </div>
                    </div>
                  </template>
                  <button class="user-msg-edit-btn" x-show="m.uuid && editingMsgUuid !== m.uuid && !streaming" @click="startEditMsg(m, i)" :title="t('msg.edit_hint')"><svg><use href="#i-edit"/></svg></button>
                </div>
              </div>
              <div x-show="m.role==='assistant' && !m._is_compact_summary" class="msg-row">
                <span class="msg-avatar assistant-avatar" :title="mascotLabel()">
                  <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
                </span>
                <div class="bubble"
                     :class="{ 'is-streaming-bubble': streaming && i === messages.length - 1 }"
                     x-html="m.html"></div>
              </div>
            <div x-show="m.role==='assistant' && m.model" class="model-tag"
                 :title="m.model"
                 x-text="modelLabel(m.model)"></div>
              <!-- TodoWrite: dedicated checklist UI instead of generic tool bubble. -->
              <template x-if="m.role==='tool_use' && m.name==='TodoWrite'"><div class="todo-card">
                <div class="todo-card-head">
                  <span class="todo-card-icon"><svg><use href="#i-check-circle"/></svg></span>
                  <span class="todo-card-title" x-text="t('todo.title')"></span>
                  <span class="todo-card-count"
                        x-text="(m.todos || []).filter(t => t.status==='completed').length + ' / ' + (m.todos || []).length"></span>
                </div>
                <ul class="todo-list">
                  <template x-for="(t, ti) in (m.todos || [])" :key="ti">
                    <li :class="'todo-item todo-' + (t.status || 'pending')">
                      <span class="todo-status">
                        <svg x-show="t.status==='completed'"><use href="#i-check"/></svg>
                        <span x-show="t.status==='in_progress'" class="todo-spinner"></span>
                        <span x-show="t.status!=='completed' && t.status!=='in_progress'" class="todo-dot"></span>
                      </span>
                      <span class="todo-text" x-text="t.content || t.subject || t.description || ''"></span>
                      <span x-show="t.status==='in_progress'" class="todo-tag" x-text="t('todo.doing')"></span>
                    </li>
                  </template>
                </ul>
              </div></template>
              <!-- Task: subagent invocation. -->
              <template x-if="m.role==='tool_use' && m.name==='Task'"><div class="subagent-card">
                <div class="subagent-head">
                  <span class="subagent-icon"><svg><use href="#i-tool"/></svg></span>
                  <span class="subagent-label" x-text="t('subagent.label')"></span>
                  <span class="subagent-type" x-text="(m.task && m.task.subagent_type) || 'agent'"></span>
                </div>
                <div class="subagent-desc" x-text="(m.task && m.task.description) || ''"></div>
                <details class="subagent-prompt" x-show="m.task && m.task.prompt">
                  <summary x-text="t('subagent.prompt_toggle')"></summary>
                  <pre x-text="m.task && m.task.prompt"></pre>
                </details>
              </div></template>
              <!-- ExitPlanMode: plan + approve/reject. Approval just acknowledges; SDK
                   permission flow is what actually gates execution. -->
              <template x-if="m.role==='tool_use' && m.name==='ExitPlanMode'"><div class="plan-card">
                <div class="plan-head">
                  <span class="plan-icon"><svg><use href="#i-check-circle"/></svg></span>
                  <span class="plan-title" x-text="t('plan.title')"></span>
                </div>
                <div class="plan-body markdown-body" x-html="renderMd(m.plan || '')"></div>
              </div></template>
              <!-- Default tool bubble for anything else. -->
              <div x-show="m.role==='tool_use' && m.name!=='TodoWrite' && m.name!=='Task' && m.name!=='ExitPlanMode'"
                   class="tool"
                   :class="{ 'tool-mcp': m.name && m.name.startsWith('mcp__'), 'tool-skill': m.name==='Skill' }">
                <span class="tool-name">
                  <span x-show="m.name && m.name.startsWith('mcp__')" class="tool-prefix-icon">🔌</span>
                  <span x-show="m.name==='Skill'" class="tool-prefix-icon">🧩</span>
                  <span x-text="renderToolName(m.name)"></span>
                </span>
                <template x-if="toolFilePath(m)">
                  <a class="tool-arg file-link" href="#"
                     :data-path="toolFilePath(m)"
                     :title="toolFilePath(m)"
                     x-text="toolFilePath(m)"></a>
                </template>
                <template x-if="!toolFilePath(m)">
                  <span class="tool-arg" x-text="m.summary"></span>
                </template>
              </div>
              <div x-show="m.role==='tool_result'"
                   :class="toolResultClass(i, m)">
                <div class="tool-result-head"
                     @click.stop="toggleMsgExpanded(m)"
                     :title="lang==='zh' ? '点击展开/折叠' : 'Click to expand / collapse'">
                  <span class="thinking-chevron">
                    <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2">
                      <path :d="isMsgExpanded(i, m) ? 'M4 6l4 4 4-4' : 'M6 4l4 4-4 4'"/>
                    </svg>
                  </span>
                  <span x-show="!isMsgExpanded(i, m)" class="tool-result-summary"
                        x-text="toolResultSummary(m)"></span>
                </div>
                <pre x-show="isMsgExpanded(i, m)" x-text="m.preview"></pre>
              </div>
              <!-- Inline system note (e.g. "model switched to X") — small, centered. -->
              <div x-show="m.role==='system_note'" class="sys-note" x-text="m.text"></div>
              <div x-show="m.role==='thinking'"
                   :class="thinkingClass(i, m)">
                <div class="thinking-head"
                     @click.stop="toggleMsgExpanded(m)"
                     :title="lang==='zh' ? '点击展开/折叠' : 'Click to expand / collapse'">
                  <span class="thinking-chevron">
                    <svg viewBox="0 0 16 16" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2">
                      <path :d="isMsgExpanded(i, m) ? 'M4 6l4 4 4-4' : 'M6 4l4 4-4 4'"/>
                    </svg>
                  </span>
                  <span class="icon"><svg><use href="#i-brain"/></svg></span>
                  <span class="thinking-label-text">thinking</span>
                  <span x-show="!isMsgExpanded(i, m)" class="thinking-preview"
                        x-text="thinkingPreview(m)"></span>
                </div>
                <pre x-show="isMsgExpanded(i, m)" x-text="m.text"></pre>
              </div>
              <!-- Muse asks user a structured question (mcp__muselab__ask_user_question).
                   Use x-if (not x-show) so the inner expressions only evaluate when this is
                   actually an ask_user_question message — avoids `m.questions.some(...)` on
                   undefined for all the other message roles. -->
              <template x-if="m.role==='ask_user_question'"><div class="ask-question">
                <div class="ask-header">
                  <span class="muse-mascot sm"><svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg></span>
                  <span class="ask-title" x-text="t('ask.title')"></span>
                  <span x-show="m.submitted" class="ask-submitted-tag" x-text="t('ask.submitted')"></span>
                </div>
                <template x-for="(q, qIdx) in m.questions" :key="qIdx">
                  <div class="ask-question-block">
                    <div class="ask-question-head">
                      <span x-show="q.header" class="ask-question-chip" x-text="q.header"></span>
                      <span class="ask-question-text" x-text="q.question"></span>
                      <span x-show="q.multiSelect" class="ask-multi-tag" x-text="t('ask.multi')"></span>
                    </div>
                    <div class="ask-options">
                      <template x-for="(opt, optIdx) in q.options" :key="optIdx">
                        <button class="ask-option"
                                :class="{ picked: isAskOptionPicked(m, qIdx, opt.label), disabled: m.submitted }"
                                :disabled="m.submitted"
                                @click="q.multiSelect ? toggleAskOption(m, qIdx, opt.label) : pickAskOption(m, qIdx, opt.label)">
                          <div class="ask-option-label" x-text="opt.label"></div>
                          <div x-show="opt.description" class="ask-option-desc" x-text="opt.description"></div>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
                <!-- Multi-select: explicit submit button. Single-select auto-submits when all chosen. -->
                <div x-show="(m.questions || []).some(q => q.multiSelect) && !m.submitted" class="ask-submit-row">
                  <button class="btn-primary" @click="submitAskAnswers(m)"
                          x-text="t('ask.submit')"></button>
                </div>
              </div></template>
              <!-- Muse asks the user to allow / deny a tool call (can_use_tool bridge).
                   Mirrors the ask_user_question pattern: x-if lazy-mounts so other roles
                   don't evaluate these expressions. -->
              <template x-if="m.role==='permission_request'"><div class="perm-request"
                  :class="{ resolved: m.resolved }">
                <div class="perm-header">
                  <span class="muse-mascot sm"><svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg></span>
                  <span class="perm-title" x-text="t('perm.title')"></span>
                  <span x-show="m.resolved" class="perm-decision-tag"
                        :class="'perm-decision-' + m.decision"
                        x-text="t('perm.decision_' + m.decision)"></span>
                </div>
                <div class="perm-body">
                  <div class="perm-tool">
                    <span class="perm-tool-icon"><svg><use href="#i-tool"/></svg></span>
                    <span class="perm-tool-name" x-text="m.tool"></span>
                  </div>
                  <pre class="perm-summary" x-text="m.summary"></pre>
                </div>
                <div class="perm-actions" x-show="!m.resolved">
                  <button class="btn-deny" @click="decidePermission(m, 'deny')"
                          x-text="t('perm.deny')"></button>
                  <button class="btn-allow" @click="decidePermission(m, 'allow')"
                          x-text="t('perm.allow')"></button>
                  <button class="btn-always" @click="decidePermission(m, 'always')"
                          x-text="t('perm.always')"></button>
                </div>
              </div></template>
              <div class="msg-actions" x-show="m.role==='assistant' || m.role==='user'">
                <button @click="copyMsg(m)" class="icon-btn sm"
                        :class="{ 'copied-flash': m._copied }"
                        :title="m._copied ? (lang==='zh'?'已复制':'Copied') : (lang==='zh'?'复制':'Copy')">
                  <svg x-show="!m._copied"><use href="#i-copy"/></svg>
                  <svg x-show="m._copied"><use href="#i-check"/></svg>
                </button>
                <button x-show="m.role==='user' && m._failed"
                        @click="retryFailedMessage(m)" class="icon-btn sm retry-btn"
                        :title="lang==='zh' ? '重试发送' : 'Retry'">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/>
                  </svg>
                </button>
              </div>
              <!-- Per-message cost annotation removed 2026-05-18: SDK's
                   ResultMessage.total_cost_usd is cumulative-per-session, so
                   each row showing "$X" was misleading (felt wrong because
                   it was). Total cost still in /cost slash + session usage. -->
            </div>
          </template>
          <!-- Pending "Muse 正在思考" bubble — only while we're waiting for
               the very first chunk. Once a streaming assistant message has
               started accumulating text (its bubble is already rendered
               above via the x-for), this pending placeholder must hide or
               we get two stacked bubbles with overlapping model labels. -->
          <div x-show="streaming && (!messages.length
                                       || (messages[messages.length-1].role !== 'assistant'
                                           && messages[messages.length-1].role !== 'tool_use'
                                           && messages[messages.length-1].role !== 'tool_result'
                                           && messages[messages.length-1].role !== 'thinking'))"
               class="msg assistant">
            <div class="msg-row">
              <span class="msg-avatar assistant-avatar" :title="mascotLabel()">
                <svg viewBox="0 0 24 24"><use :href="mascotHref()"/></svg>
              </span>
              <div class="bubble pending">
                <span class="thinking-dots"><span></span><span></span><span></span></span>
                <span class="thinking-label">
                  <span x-text="t('chat.thinking') + ' · ' + modelLabel(streamingModel)"></span>
                  <span x-show="streamElapsed > 1" class="stream-elapsed"
                        x-text="' · ' + streamElapsed.toFixed(1) + 's'"></span>
                </span>
              </div>
            </div>
          </div>
        </div>
        <button class="jump-bottom" x-show="!atBottom" @click="scrollToBottom(true)" :title="lang==='zh'?'最新':'Jump to latest'"><svg><use href="#i-arrow-down"/></svg></button>
      </div>

      <div class="chat-input">
        <!-- / slash command palette -->
        <div class="mention-pop slash-pop" x-show="slashShow" x-transition.opacity>
          <div class="mention-hint" x-text="t('slash.hint')"></div>
          <template x-for="(c, i) in slashResults" :key="c.name">
            <div :class="'mention-item ' + (slashIdx===i?'sel':'')"
                 @mousedown.prevent="pickSlash(i)" @mouseenter="slashIdx=i">
              <span class="slash-name mono" x-text="'/' + c.name"></span>
              <span class="slash-desc" x-text="c.desc[lang] || c.desc.zh"></span>
            </div>
          </template>
          <div class="hint-row" x-show="!slashResults.length" x-text="t('slash.none')"></div>
        </div>
        <!-- @ mention -->
        <div class="mention-pop" x-show="mentionShow" x-transition.opacity>
          <div class="mention-hint" x-html="lang==='zh' ? '<span class=&quot;kbd&quot;>↑↓</span> 选 · <span class=&quot;kbd&quot;>Enter</span> 插入 · <span class=&quot;kbd&quot;>Esc</span> 关' : '<span class=&quot;kbd&quot;>↑↓</span> nav · <span class=&quot;kbd&quot;>Enter</span> insert · <span class=&quot;kbd&quot;>Esc</span> close'"></div>
          <template x-for="(f, i) in mentionResults" :key="f.path">
            <div :class="'mention-item ' + (mentionIdx===i?'sel':'')"
                 :title="f.path"
                 @mousedown.prevent="pickMention(i)" @mouseenter="mentionIdx=i">
              <span class="icon"><svg><use :href="iconRef(f)"/></svg></span>
              <div class="body">
                <div class="name ellipsis" x-text="f.name"></div>
                <div class="path-hint ellipsis" x-text="f.path"></div>
              </div>
            </div>
          </template>
          <div class="hint-row" x-show="!mentionResults.length" x-text="t('files.empty_search')"></div>
        </div>
        <!-- Attachment preview row (above input). -->
        <div class="img-attachments" x-show="pendingImages.length || pendingDocs.length">
          <template x-for="(img, i) in pendingImages" :key="img.id || ('i'+i)">
            <div class="img-chip" :class="{ uploading: img.uploading, error: img.error }">
              <img :src="img.preview" alt="" />
              <button class="img-chip-x icon-btn sm"
                      @click="removePendingImage(i)" :title="t('img.remove')">
                <svg><use href="#i-x"/></svg>
              </button>
              <span x-show="img.uploading" class="img-chip-spin"></span>
            </div>
          </template>
          <template x-for="(doc, i) in pendingDocs" :key="doc.id || ('d'+i)">
            <div class="doc-chip" :class="{ uploading: doc.uploading, error: doc.error }"
                 :title="doc.name + ' · ' + doc.kind">
              <span class="doc-chip-icon"><svg><use href="#i-file-text"/></svg></span>
              <div class="doc-chip-body">
                <div class="doc-chip-name" x-text="doc.name"></div>
                <div class="doc-chip-kind" x-text="doc.kind"></div>
              </div>
              <button class="doc-chip-x icon-btn sm"
                      @click="removePendingDoc(i)" :title="t('img.remove')">
                <svg><use href="#i-x"/></svg>
              </button>
              <span x-show="doc.uploading" class="img-chip-spin"></span>
            </div>
          </template>
        </div>
        <!-- VSCode-Claude–style layout:
             row 1: textarea (full width, no neighbors)
             row 2: bottom toolbar with all controls — attach / model /
                    permission / thinking / ctx chip / send -->
        <div class="chat-input-wrap"
             @dragover.prevent="dragHover=true"
             @dragleave="dragHover=false"
             @drop.prevent="dragHover=false; onAttachDrop($event)"
             :class="{ 'drag-hover': dragHover }">
          <!-- No `accept` filter — lets the user pick any file from the OS
               picker. The classifier (frontend + backend) decides what
               actually gets inlined; unsupported types are rejected with
               a clear toast instead of being hidden in the picker. -->
          <input type="file" x-ref="attachInput"
                 multiple style="display:none" @change="onAttachPicked($event)" />
          <!-- 包一个 noop form：iOS 17+ AutoFill 会用"页面上下文"决定要不要在
               键盘上方塞快译条；只要 textarea 没有 form 父元素 / form 里有
               type=password input，iOS 就会把它当成账户字段。display:contents
               让这个 form 不参与布局，只提供 DOM 语义。 -->
          <form autocomplete="off" onsubmit="return false" style="display:contents">
          <textarea x-model="input" x-ref="chatInput"
                    class="chat-input-textarea"
                    name="muselab-chat-message"
                    inputmode="text"
                    autocomplete="off" autocorrect="off"
                    autocapitalize="sentences" spellcheck="false"
                    enterkeyhint="send"
                    data-1p-ignore="" data-lpignore="true" data-form-type="other"
                    @keydown.enter.prevent.stop="onEnter($event)"
                    @keydown.escape="mentionShow=false; slashShow=false"
                    @keydown.up="onChatArrowUp($event)"
                    @keydown.down="(mentionShow || slashShow) && _navPop(1) && $event.preventDefault()"
                    @input="onChatInput($event); autoGrow($event.target)"
                    @paste="onImagePaste($event)"
                    :placeholder="t('chat.placeholder')" :disabled="streaming"></textarea>
          </form>
          <div class="chat-toolbar">
            <!-- Attach button -->
            <button @click="$refs.attachInput.click()"
                    class="chat-toolbar-btn"
                    :disabled="streaming" :title="t('attach.title')">
              <svg><use href="#i-paperclip"/></svg>
            </button>
            <!-- Model selector -->
            <select x-model="model" @change="onModelChange()"
                    class="chat-toolbar-select"
                    :title="lang==='zh' ? '切换模型' : 'Switch model'">
              <template x-if="model && !availableModels.some(m => m.model === model)">
                <option :value="model" x-text="model"></option>
              </template>
              <template x-for="grp in modelGroups()" :key="grp.name">
                <optgroup :label="grp.name">
                  <template x-for="m in grp.items" :key="m.model">
                    <option :value="m.model" x-text="m.label"></option>
                  </template>
                </optgroup>
              </template>
            </select>
            <!-- Permission mode -->
            <select x-model="permission" class="chat-toolbar-select"
                    :title="t('set.label.default_permission')">
              <option value="bypassPermissions">bypass</option>
              <option value="acceptEdits">acceptEdits</option>
              <option value="default">default</option>
              <option value="plan">plan</option>
            </select>
            <!-- Reasoning effort. Empty = SDK adaptive default (Opus 4.7's
                 adaptive thinking picks per turn). Overrides apply session-
                 wide and trigger a client rebuild on next turn. -->
            <select x-model="effort" @change="onEffortChange()"
                    class="chat-toolbar-select"
                    :title="t('effort.title')">
              <option value="" x-text="t('effort.auto')"></option>
              <option value="low" x-text="t('effort.low')"></option>
              <option value="medium" x-text="t('effort.medium')"></option>
              <option value="high" x-text="t('effort.high')"></option>
              <option value="xhigh" x-text="t('effort.xhigh')"></option>
              <option value="max" x-text="t('effort.max')"></option>
            </select>
            <!-- Context ring — % used. Click to compact. Right-click
                 opens the SDK breakdown popup (the dedicated magnifier
                 button was removed per user request). -->
            <button class="chat-toolbar-ring"
                    :class="{
                      warn: sessionUsage.context_used_pct >= 70 && sessionUsage.context_used_pct < 90,
                      danger: sessionUsage.context_used_pct >= 90,
                    }"
                    @click="runCompact()"
                    @contextmenu.prevent="showCtxBreakdown()"
                    :title="ctxRingTitle()">
              <svg viewBox="0 0 20 20" width="18" height="18">
                <circle cx="10" cy="10" r="7" fill="none"
                        stroke="var(--c-bg-4)" stroke-width="2.5"/>
                <circle cx="10" cy="10" r="7" fill="none"
                        stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round"
                        stroke-dasharray="43.98"
                        :stroke-dashoffset="43.98 * (1 - Math.min(100, sessionUsage.context_used_pct||0) / 100)"
                        transform="rotate(-90 10 10)"/>
              </svg>
            </button>
            <span class="chat-toolbar-spacer"></span>
            <!-- Send / Stop -->
            <button x-show="!streaming" @click="send()"
                    :disabled="!input.trim() && !pendingImages.length && !pendingDocs.length"
                    class="btn-primary chat-toolbar-send" :title="t('btn.send')">
              <span class="icon"><svg><use href="#i-send"/></svg></span><span x-text="t('btn.send')"></span>
            </button>
            <button x-show="streaming" @click="stop()" class="btn-danger chat-toolbar-send" :title="t('btn.stop') + ' (Esc)'">
              <span class="icon"><svg><use href="#i-square"/></svg></span><span x-text="t('btn.stop')"></span>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile tab bar — only shown via CSS @media on narrow viewports.
         Sits as a sibling of the panes in the same grid; on mobile, the panes
         become full-width and we swap which one is visible via mobileTab. -->
    <nav class="mobile-tab-bar" x-show="authed">
      <button :class="{active: mobileTab==='files'}" @click="mobileTab='files'">
        <span class="icon"><svg><use href="#i-folder"/></svg></span>
        <span x-text="t('pane.files')"></span>
      </button>
      <button :class="{active: mobileTab==='preview'}" @click="mobileTab='preview'">
        <span class="icon"><svg><use href="#i-file-text"/></svg></span>
        <span x-text="t('pane.preview')"></span>
      </button>
      <button :class="{active: mobileTab==='chat'}" @click="mobileTab='chat'">
        <span class="icon"><svg><use href="#i-brain"/></svg></span>
        <span x-text="t('pane.chat')"></span>
      </button>
    </nav>

  </div>

  <!-- ============ Image lightbox ============ -->
  <div class="lightbox"
       x-show="lightbox.show"
       x-transition.opacity
       @click="lightbox.show = false"
       @keydown.escape.window="lightbox.show = false">
    <img :src="lightbox.src" class="lightbox-img" @click.stop alt="" />
    <button class="lightbox-close"
            :title="lang==='zh' ? '关闭 (Esc)' : 'Close (Esc)'"
            @click.stop="lightbox.show = false">×</button>
  </div>

  <!-- ============ Toast ============ -->
  <div class="toast-stack">
    <template x-for="t in toasts" :key="t.id">
      <div :class="'toast ' + (t.type || '')">
        <span class="icon">
          <svg x-show="t.type==='success'"><use href="#i-check-circle"/></svg>
          <svg x-show="t.type==='error'"><use href="#i-alert-circle"/></svg>
          <svg x-show="t.type==='warn'"><use href="#i-alert-triangle"/></svg>
          <svg x-show="!t.type || t.type==='info'"><use href="#i-info"/></svg>
        </span>
        <div class="body" x-text="t.msg"></div>
        <button x-show="t.action" class="toast-action"
                @click="runToastAction(t)" x-text="t.action && t.action.label"></button>
        <button class="close"
                :title="lang==='zh' ? '关闭' : 'Dismiss'"
                @click="dismissToast(t.id)"><svg style="width:14px;height:14px"><use href="#i-x"/></svg></button>
      </div>
    </template>
  </div>

  <!-- ============ Context Menu ============ -->
  <div class="ctx-menu" x-show="ctxMenu.show"
       :style="`top:${ctxMenu.y}px; left:${ctxMenu.x}px`"
       @click.away="ctxMenu.show=false">
    <!-- 目录专属：新建 -->
    <button class="ctx-item" @click="ctxAction('newFile')" x-show="(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-file"/></svg></span><span x-text="t('btn.new_file')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('newDir')" x-show="(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-folder-plus"/></svg></span><span x-text="t('btn.new_dir')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('upload')" x-show="(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-upload"/></svg></span><span x-text="t('btn.upload')"></span>
    </button>
    <div class="ctx-sep" x-show="(ctxMenu.node && ctxMenu.node.is_dir)"></div>
    <!-- 文件专属 -->
    <button class="ctx-item" @click="ctxAction('open')" x-show="!(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-eye"/></svg></span><span x-text="t('btn.preview')"></span>
    </button>
    <button class="ctx-item" @click="ctxAction('mention')" x-show="!(ctxMenu.node && ctxMenu.node.is_dir)">
      <span class="icon"><svg><use href="#i-at"/></svg></span><span x-text="t('btn.at_mention')"></span>
